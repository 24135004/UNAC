<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Movilidad Universitaria</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #ffc107; 
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        .main-wrapper {
            position: relative;
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.95)), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* HEADER CORREGIDO PARA MÓVIL */
        header {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        /* CONTENEDOR PRINCIPAL RE-AJUSTADO */
        .content-box {
            max-width: 1000px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            gap: 20px;
            flex-grow: 1;
        }

        .text-side { flex: 1; }
        
        h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(1.8rem, 5vw, 2.8rem); 
            line-height: 1.1; 
            font-weight: 700;
        }

        /* GLOBO RESPONSIVO */
        #globe-box { 
            width: 320px; 
            height: 320px; 
            flex-shrink: 0;
        }

        /* TARJETAS */
        .stats-area {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1000px;
            width: 90%;
            margin-bottom: 40px;
        }

        .card-3d {
            background: var(--glass);
            border: 1px solid rgba(255, 193, 7, 0.15);
            backdrop-filter: blur(8px);
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s ease;
        }

        .card-3d h3 { color: var(--accent); font-size: 1.5rem; font-weight: 700; margin: 0; }
        .card-3d p { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin: 5px 0 0; }

        /* VISTA MÓVIL (CORRECCIONES) */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .content-box { 
                flex-direction: column-reverse; /* Globo arriba, texto abajo */
                text-align: center;
                padding: 10px 0;
                justify-content: center;
            }
            #globe-box { 
                width: 240px; 
                height: 240px; 
                margin-top: -20px;
            }
            .text-side { width: 100%; }
            .text-side .flex { justify-content: center; } /* Centra el indicador amarillo */
            
            h1 { margin-top: 15px; }

            .stats-area { 
                grid-template-columns: repeat(2, 1fr); 
                margin-bottom: 30px;
            }

            .nav-links-desktop { display: none; } /* Ocultar links en móvil para limpieza */
        }

        .nav-link { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: #aaa; transition: 0.3s; }
        .nav-link:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Header -->
        <header>
            <div class="flex flex-col">
                <span class="text-[10px] font-bold tracking-[3px] opacity-50 uppercase">UNAC</span>
                <span class="text-[12px] font-bold text-yellow-500 uppercase">Movilidad Universitaria</span>
            </div>
            <nav class="hidden md:flex gap-6 uppercase">
                <a href="#" class="nav-link">Inicio</a>
                <a href="#" class="nav-link">Horarios</a>
                <a href="#" class="nav-link border border-yellow-500/30 px-4 py-1 rounded-full">Consultas</a>
            </nav>
        </header>

        <!-- Bloque Inicio -->
        <div class="content-box">
            <!-- Texto -->
            <div class="text-side">
                <div class="flex items-center gap-2 mb-3">
                    <span class="w-6 h-[1px] bg-yellow-500"></span>
                    <span class="text-yellow-500 text-[9px] font-bold uppercase tracking-[2px]">Gestión de Transporte</span>
                </div>
                <h1>Transporte <br><span class="opacity-40 italic font-light">Estratégico</span></h1>
                <p class="mt-4 text-gray-400 max-w-md mx-auto md:mx-0">Conectando el Campus con la comunidad universitaria. Servicio optimizado para el ciclo 2024-A.</p>
                
                <div class="flex gap-3 mt-8">
                    <button class="bg-yellow-500 text-black text-[11px] font-bold px-6 py-3 rounded hover:scale-105 transition shadow-lg shadow-yellow-500/20">HORARIOS</button>
                    <button class="border border-white/20 text-[11px] font-bold px-6 py-3 rounded hover:bg-white/5 transition">RUTAS</button>
                </div>
            </div>

            <!-- Globo -->
            <div id="globe-box"></div>
        </div>

        <!-- Estadísticas -->
        <div class="stats-area">
            <div class="card-3d">
                <h3>02</h3>
                <p>Vehículos</p>
            </div>
            <div class="card-3d">
                <h3>35km</h3>
                <p>Ruta Total</p>
            </div>
            <div class="card-3d">
                <h3>55m</h3>
                <p>Promedio</p>
            </div>
            <div class="card-3d">
                <h3>+600</h3>
                <p>Alumnos</p>
            </div>
        </div>

        <footer class="pb-6 text-[9px] text-gray-600 tracking-[3px] uppercase">
            UNAC - Control Tecnológico v4.0
        </footer>
    </div>

    <script>
        let scene, camera, renderer, globe;
        const container = document.getElementById('globe-box');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(35, 40, 40);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffc107,
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Nodos sutiles
            const nodesGeom = new THREE.SphereGeometry(35.5, 20, 20);
            const nodesMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, transparent: true, opacity: 0.4 });
            const nodes = new THREE.Points(nodesGeom, nodesMat);
            globe.add(nodes);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.002;
            globe.rotation.x += 0.001;
            renderer.render(scene, camera);
        }

        // Ajuste de tamaño en tiempo real
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        window.onload = init;
    </script>
</body>
</html>

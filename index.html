<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAC Movilidad | Inicio</title>
    
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #00d2ff; --bg: #020617; }
        
        body, html { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow-x: hidden;
            height: 100%;
        }

        .font-tech { font-family: 'Orbitron', sans-serif; }

        /* Contenedor del Globo 3D */
        #globe-container {
            width: 100%;
            height: 400px; /* Altura para móvil */
            position: relative;
        }

        @media (min-width: 768px) {
            #globe-container {
                height: 600px; /* Altura para PC */
            }
        }

        /* Degradado de texto */
        .text-gradient {
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botón Pro */
        .btn-main {
            position: relative;
            background: transparent;
            border: 1px solid var(--accent);
            color: white;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            overflow: hidden;
            border-radius: 4px;
        }

        .btn-main:hover {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            color: black;
        }

        /* Ajuste de sección para que no se corte */
        .hero-section {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- Header Minimalista -->
    <nav class="w-full px-6 py-6 md:px-12 flex justify-between items-center relative z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-500 rounded-sm rotate-45 flex items-center justify-center">
                <i class="fas fa-satellite-dish text-white -rotate-45 text-xs"></i>
            </div>
            <span class="font-tech font-bold text-xl tracking-tighter">UNAC <span class="text-blue-400">MOV</span></span>
        </div>
        <div class="hidden md:flex gap-8 text-[10px] font-tech tracking-widest text-gray-400">
            <a href="#" class="text-blue-400">INICIO</a>
            <a href="#" class="hover:text-white transition">RUTAS</a>
            <a href="#" class="hover:text-white transition">SISTEMA</a>
        </div>
    </nav>

    <!-- HERO SECTION: INICIO -->
    <main class="hero-section px-6 md:px-12">
        <div class="max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            
            <!-- Columna Izquierda: Texto -->
            <div class="text-center md:text-left order-2 md:order-1">
                <h2 class="text-blue-500 font-tech text-xs tracking-[0.4em] mb-4 uppercase">Global Mobility System</h2>
                <h1 class="text-4xl md:text-7xl font-tech font-bold leading-tight mb-6 uppercase">
                    Ventanilla <br>
                    <span class="text-gradient">Interconectada.</span>
                </h1>
                <p class="text-gray-400 text-sm md:text-base max-w-md mx-auto md:mx-0 mb-8 leading-relaxed">
                    Implementación de nodos tecnológicos para el transporte universitario. Monitoreo global y eficiencia en cada ruta.
                </p>
                <div class="flex flex-col md:flex-row gap-4 justify-center md:justify-start">
                    <button class="btn-main font-tech">Iniciar Sistema</button>
                    <button class="text-[10px] font-tech tracking-widest border-b border-gray-700 py-2 hover:border-blue-400 transition">Saber más</button>
                </div>
            </div>

            <!-- Columna Derecha: Globo Terráqueo 3D -->
            <div class="order-1 md:order-2 flex justify-center items-center">
                <div id="globe-container">
                    <!-- Aquí se renderiza el globo terráqueo -->
                </div>
            </div>

        </div>
    </main>

    <!-- Script del Globo Terráqueo -->
    <script>
        let scene, camera, renderer, globe;

        function initGlobe() {
            const container = document.getElementById('globe-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            // Escena
            scene = new THREE.Scene();

            // Cámara
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = 180;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            // Crear el Globo (Geometría)
            const geometry = new THREE.SphereGeometry(60, 64, 64);
            
            // Material con textura de malla tecnológica (Wireframe)
            const material = new THREE.MeshBasicMaterial({
                color: 0x00d2ff,
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Añadir puntos brillantes (nodos) al azar sobre la superficie
            const pointsGeometry = new THREE.SphereGeometry(61, 32, 32);
            const pointsMaterial = new THREE.PointsMaterial({
                color: 0x00d2ff,
                size: 0.7
            });
            const points = new THREE.Points(pointsGeometry, pointsMaterial);
            globe.add(points);

            // Animación
            function animate() {
                requestAnimationFrame(animate);
                globe.rotation.y += 0.002;
                globe.rotation.x += 0.001;
                renderer.render(scene, camera);
            }
            animate();
        }

        // Manejar cambio de tamaño de ventana
        window.addEventListener('resize', () => {
            const container = document.getElementById('globe-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Iniciar
        initGlobe();
    </script>

</body>
</html>

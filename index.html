<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAC | Movilidad Universitaria</title>
    
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { 
            --accent: #ffc107; 
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 193, 7, 0.2);
        }
        
        * { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* FONDO OPTIMIZADO */
        .main-wrapper {
            position: relative;
            background: linear-gradient(rgba(10, 10, 10, 0.8), rgba(10, 10, 10, 0.95)), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CONTENEDOR PRINCIPAL */
        .content-box {
            max-width: 1000px;
            width: 100%;
            margin-top: 5vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            z-index: 10;
        }

        .text-side { max-width: 500px; animation: fadeInUp 0.8s ease-out; }
        
        h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: clamp(2rem, 5vw, 3rem); 
            line-height: 1.1; 
            font-weight: 700;
            margin-bottom: 1rem;
        }

        p { 
            font-size: 0.95rem; 
            color: #cbd5e1; 
            line-height: 1.6;
            font-weight: 300;
        }

        /* GLOBO 3D */
        #globe-box { 
            width: 300px; 
            height: 300px; 
            cursor: grab;
            filter: drop-shadow(0 0 20px rgba(255, 193, 7, 0.1));
        }

        /* TARJETAS 3D */
        .stats-area {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1000px;
            width: 90%;
            margin: 40px 0;
            perspective: 1000px;
        }

        .card-3d {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            padding: 25px 15px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        .card-3d:hover {
            transform: translateY(-10px) rotateX(5deg);
            border-color: var(--accent);
            background: rgba(255, 193, 7, 0.08);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .card-3d h3 { 
            color: var(--accent); 
            font-size: 1.75rem; 
            font-weight: 700; 
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .card-3d p { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #94a3b8; 
            margin: 8px 0 0;
            font-weight: 600;
        }

        /* NAVEGACIÓN */
        .nav-link { 
            font-size: 0.75rem; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            color: #94a3b8; 
            transition: 0.3s;
        }
        .nav-link:hover, .active-link { color: var(--accent); }

        /* ANIMACIONES */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .content-box { 
                flex-direction: column-reverse; 
                text-align: center; 
                margin-top: 20px;
                padding: 1.5rem;
            }
            #globe-box { width: 250px; height: 250px; margin-bottom: 2rem; }
            .stats-area { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .text-side { max-width: 100%; }
            .text-side .flex { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Header -->
        <header class="w-full max-w-6xl px-6 py-8 flex justify-between items-center z-50">
            <div class="flex flex-col">
                <span class="text-[10px] font-black tracking-[4px] opacity-40 uppercase">UNAC</span>
                <span class="text-[12px] font-bold text-yellow-500 uppercase tracking-wider">Movilidad</span>
            </div>
            <nav class="hidden md:flex items-center gap-8 uppercase">
                <a href="#" class="nav-link active-link">Inicio</a>
                <a href="#" class="nav-link">Horarios</a>
                <a href="#" class="nav-link">Rutas</a>
                <a href="#" class="nav-link border border-yellow-500/40 px-4 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-all">Consultas</a>
            </nav>
        </header>

        <!-- Bloque Inicio -->
        <main class="content-box">
            <!-- Texto -->
            <div class="text-side">
                <div class="flex items-center gap-3 mb-4">
                    <span class="w-8 h-[2px] bg-yellow-500"></span>
                    <span class="text-yellow-500 text-[10px] font-bold uppercase tracking-[3px]">Sistema Inteligente de Control</span>
                </div>
                <h1>Transporte <br><span class="opacity-30 font-light">Universitario</span></h1>
                <p class="mb-8">Optimización y gestión de rutas para la comunidad de la Universidad Nacional del Callao. Ciclo 2024-A.</p>
                
                <div class="flex gap-4">
                    <button class="bg-yellow-500 text-black text-[12px] font-bold px-8 py-3 rounded-lg shadow-xl shadow-yellow-500/10 hover:bg-yellow-400 hover:-translate-y-1 transition-all">
                        VER HORARIOS
                    </button>
                    <button class="bg-white/5 border border-white/10 text-[12px] font-bold px-8 py-3 rounded-lg hover:bg-white/10 transition-all">
                        RUTAS
                    </button>
                </div>
            </div>

            <!-- Globo 3D -->
            <div id="globe-box"></div>
        </main>

        <!-- Estadísticas -->
        <section class="stats-area">
            <div class="card-3d">
                <h3>02</h3>
                <p>Unidades</p>
            </div>
            <div class="card-3d">
                <h3>35km</h3>
                <p>Recorrido</p>
            </div>
            <div class="card-3d">
                <h3>55m</h3>
                <p>Tiempos</p>
            </div>
            <div class="card-3d">
                <h3>+600</h3>
                <p>Usuarios</p>
            </div>
        </section>

        <footer class="mt-auto py-10 text-[10px] text-gray-500 tracking-[4px] uppercase opacity-60">
            UNAC &copy; 2024 Tech Control Unit
        </footer>
    </div>

    <script>
        let scene, camera, renderer, globe;
        const container = document.getElementById('globe-box');

        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Geometría del Globo (Estructura)
            const geometry = new THREE.SphereGeometry(35, 64, 64);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffc107,
                wireframe: true,
                transparent: true,
                opacity: 0.1
            });

            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Puntos de luz / Nodos
            const nodesGeom = new THREE.SphereGeometry(35.5, 32, 32);
            const nodesMat = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.5,
                transparent: true,
                opacity: 0.5 
            });
            const nodes = new THREE.Points(nodesGeom, nodesMat);
            globe.add(nodes);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.0015;
            globe.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }

        // Ajustar el tamaño del canvas al cambiar el tamaño de ventana
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        window.onload = init;
    </script>
</body>
</html>

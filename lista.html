<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Manifiesto de Pasajeros Sincronizado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow-x: hidden; }

        .main-wrapper {
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.4) 0%, rgba(5, 5, 5, 1) 100%), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; width: 100%; display: flex; flex-direction: column;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeInUp 0.6s ease-out forwards; }

        /* TARJETA CON BORDE BLANCO SOLICITADO */
        .card-student {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid #ffffff; 
            border-radius: 25px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        
        .shift-tag {
            position: absolute; top: 0; right: 0;
            padding: 5px 15px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; border-bottom-left-radius: 15px;
            color: #fff;
        }

        .name-display { font-family: 'Montserrat'; font-weight: 800; font-size: 14px; text-transform: uppercase; color: #fff; margin-bottom: 5px; }
        .fac-display { font-size: 9px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
        .dni-mask { font-family: 'Share Tech Mono'; color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 5px; }

        .search-container {
            width: 100%; background: rgba(0,0,0,0.5); border: 1.5px solid #ffffff;
            padding: 15px 25px; border-radius: 20px; color: #fff; outline: none;
        }

        .btn-back {
            background: #fff; color: #000; font-weight: 900; padding: 12px 25px;
            border-radius: 15px; font-size: 11px; text-transform: uppercase;
            transition: 0.3s;
        }

        #loader { text-align: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="max-w-7xl mx-auto w-full p-8 flex justify-between items-center animate-fade-up">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center text-black shadow-lg"><i class="fa-solid fa-users-viewfinder text-xl"></i></div>
                <div class="flex flex-col leading-none uppercase font-black">
                    <span class="text-xs">UNAC</span><span class="text-[9px] text-yellow-500">Manifiesto Digital</span>
                </div>
            </div>
            <a href="ticket.html" class="btn-back"><i class="fa-solid fa-chevron-left mr-2"></i> Volver</a>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-4 w-full flex-grow z-20">
            
            <div class="text-center mb-10 animate-fade-up">
                <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter mb-2">Pasajeros <span class="text-yellow-500">Registrados</span></h1>
                <p class="text-gray-400 text-[10px] uppercase tracking-[4px]">Sincronización Multi-Servidor (Datos Link 1 + Registros Link 2)</p>
            </div>

            <!-- FILTRO -->
            <div class="max-w-md mx-auto mb-12 animate-fade-up">
                <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="FILTRAR POR DNI O NOMBRE..." class="search-container font-bold text-center">
            </div>

            <!-- LOADER -->
            <div id="loader">
                <div class="spinner"></div>
                <p class="text-[10px] font-black uppercase tracking-[5px] text-gray-500">Obteniendo datos de registro...</p>
            </div>

            <!-- GRID -->
            <div id="grid-pasajeros" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Se inyecta aquí -->
            </div>

        </main>

        <footer class="w-full py-12 flex flex-col items-center border-t border-white/5 bg-black/40 mt-10">
            <span class="text-center text-[10px] font-bold tracking-[8px] text-yellow-500 mb-2 uppercase">SISTEMA CREADO POR SEBASTIAN</span>
            <span class="text-center text-[9px] text-gray-500 tracking-[1px] uppercase italic">© 2026 UNAC - Registro Oficial Sincronizado</span>
        </footer>
    </div>

    <script>
        const L1 = "https://script.google.com/macros/s/AKfycbwzVasP01RADjpQeQjULw_XT0ypa1hrB8_Y0OJgMDpXhr7PNMT1nkYQsTjwRr03TaR0Vg/exec";
        const L2 = "https://script.google.com/macros/s/AKfycbyyqBaPfLgVw6CJBV_Du3yfZEK_pGvrg7YkEYk5oDTEcaGbzh4X07I941YdJuEnFTn4/exec";

        async function initLista() {
            try {
                // 1. Obtener lista de DNIs del Link 2
                const resL2 = await fetch(`${L2}?accion=obtener_lista`);
                const dataL2 = await resL2.json();
                
                if (!dataL2.lista || dataL2.lista.length === 0) {
                    document.getElementById('loader').innerHTML = "NO HAY REGISTROS";
                    return;
                }

                const container = document.getElementById('grid-pasajeros');
                document.getElementById('loader').style.display = 'none';

                // 2. Por cada registro, buscar datos en Link 1
                for (let item of dataL2.lista) {
                    // Llamada al Link 1 para cada DNI
                    const resL1 = await fetch(`${L1}?dni=${item.dni}`);
                    const student = await resL1.json();

                    const nombre = student.found ? student.Estudiante : "USUARIO NO REGISTRADO";
                    const facultad = student.found ? student.Facultad : "S/D";
                    const dniMasked = item.dni.toString().charAt(0) + "********";
                    
                    const shiftColor = item.turno === 'MAÑANA' ? 'bg-blue-600' : (item.turno === 'TARDE' ? 'bg-orange-600' : 'bg-purple-600');

                    const card = `
                        <div class="card-student animate-fade-up">
                            <div class="shift-tag ${shiftColor}">${item.turno}</div>
                            <div class="name-display">${nombre}</div>
                            <div class="fac-display">${facultad}</div>
                            <div class="dni-mask">DNI: ${dniMasked}</div>
                            <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                                <span class="text-[9px] text-gray-500 font-bold uppercase">Validación:</span>
                                <span class="text-[10px] font-black text-yellow-500">${item.fecha}</span>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }

            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "ERROR DE SINCRONIZACIÓN";
            }
        }

        function searchTable() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('card-student');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toUpperCase();
                cards[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }

        window.onload = initLista;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Manifiesto de Pasajeros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow-x: hidden; }
        .main-wrapper {
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.4) 0%, rgba(5, 5, 5, 1) 100%), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; width: 100%; display: flex; flex-direction: column;
        }
        /* TARJETA PROFESIONAL CON BORDE BLANCO */
        .card-student {
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid #ffffff; border-radius: 25px; padding: 20px;
            position: relative; transition: 0.4s; backdrop-filter: blur(15px);
        }
        .order-badge { position: absolute; top: -10px; left: 20px; background: #ff4500; color: white; padding: 2px 15px; border-radius: 10px; font-weight: 900; font-size: 14px; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
        .shift-tag { position: absolute; top: 0; right: 0; padding: 5px 15px; font-size: 9px; font-weight: 900; text-transform: uppercase; border-bottom-left-radius: 15px; }
        .bg-manana { background: #3b82f6; } .bg-tarde { background: #f59e0b; } .bg-noche { background: #8b5cf6; }
        .input-search { width: 100%; background: rgba(0,0,0,0.6); border: 1.5px solid #ffffff; padding: 18px; border-radius: 20px; color: #fff; text-align: center; font-weight: 700; outline: none; }
        .btn-back { background: #fff; color: #000; font-weight: 900; padding: 10px 20px; border-radius: 12px; font-size: 11px; text-transform: uppercase; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <header class="max-w-7xl mx-auto w-full p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center text-black font-black shadow-lg">U</div>
                <div class="flex flex-col leading-none uppercase font-black"><span class="text-xs">UNAC</span><span class="text-[9px] text-yellow-500">Manifiesto</span></div>
            </div>
            <button onclick="window.close()" class="btn-back">Cerrar Lista</button>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-4 w-full flex-grow z-20">
            <div class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter mb-2">Pasajeros <span class="text-yellow-500">Registrados</span></h1>
                <p class="text-gray-400 text-[10px] uppercase tracking-[4px]">Sincronización Total con Base de Datos UNAC</p>
            </div>

            <div class="max-w-md mx-auto mb-10">
                <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="FILTRAR POR DNI O NOMBRE..." class="input-search shadow-2xl">
            </div>

            <div id="loader" class="text-center py-10">
                <div class="spinner"></div>
                <p class="text-[10px] font-black uppercase tracking-[5px] mt-4 text-gray-500">Cargando Manifiesto...</p>
            </div>

            <div id="grid-pasajeros" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </main>
    </div>

    <script>
        const L1 = "https://script.google.com/macros/s/AKfycbwzVasP01RADjpQeQjULw_XT0ypa1hrB8_Y0OJgMDpXhr7PNMT1nkYQsTjwRr03TaR0Vg/exec";
        const L2 = "https://script.google.com/macros/s/AKfycbyyqBaPfLgVw6CJBV_Du3yfZEK_pGvrg7YkEYk5oDTEcaGbzh4X07I941YdJuEnFTn4/exec";

        async function initLista() {
            try {
                const res = await fetch(`${L2}?accion=obtener_lista`);
                const data = await res.json();
                
                if (!data.lista || data.lista.length === 0) {
                    document.getElementById('loader').innerHTML = "NO HAY REGISTROS";
                    return;
                }

                document.getElementById('loader').style.display = 'none';
                const container = document.getElementById('grid-pasajeros');

                // Primero dibujamos los cuadros con DNI para que se vea la lista "AL TOQUE"
                data.lista.forEach((item, index) => {
                    const dniMasked = item.dni.charAt(0) + "********";
                    const shiftClass = item.turno === 'MAÑANA' ? 'bg-manana' : (item.turno === 'TARDE' ? 'bg-tarde' : 'bg-noche');
                    const asiento = item.orden > 45 ? "🧍" : item.orden.toString().padStart(2, '0');

                    const card = `
                        <div class="card-student" id="card-${item.dni}">
                            <div class="order-badge">ASIENTO: ${asiento}</div>
                            <div class="shift-tag ${shiftClass}">${item.turno}</div>
                            <div class="pt-4">
                                <div class="name-placeholder text-gray-600 text-xs font-bold animate-pulse mb-2">CARGANDO NOMBRE...</div>
                                <div class="fac-display text-[9px] font-bold text-yellow-500 uppercase tracking-widest">RUTA VENTANILLA</div>
                                <div class="text-[10px] text-gray-500 font-mono mt-2">DNI: ${dniMasked}</div>
                                <div class="mt-4 pt-4 border-t border-white/5 text-[10px] font-black text-gray-400">FECHA: ${item.fecha}</div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                // Luego, cargamos los nombres reales del Link 1 uno por uno
                data.lista.forEach(async (item) => {
                    try {
                        const sRes = await fetch(`${L1}?dni=${item.dni}`);
                        const student = await sRes.json();
                        const cardEl = document.getElementById(`card-${item.dni}`);
                        if (student.found) {
                            cardEl.querySelector('.name-placeholder').innerText = student.Estudiante;
                            cardEl.querySelector('.name-placeholder').classList.remove('animate-pulse', 'text-gray-600');
                            cardEl.querySelector('.name-placeholder').classList.add('text-white', 'text-sm', 'font-black', 'uppercase');
                            cardEl.querySelector('.fac-display').innerText = student.Facultad;
                        }
                    } catch (e) {}
                });

            } catch (e) {
                document.getElementById('loader').innerHTML = "ERROR DE CONEXIÓN";
            }
        }

        function searchTable() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('card-student');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toUpperCase();
                cards[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }
        window.onload = initLista;
    </script>
</body>
</html>

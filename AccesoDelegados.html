<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Panel Delegados Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body { background-color: var(--dark); font-family: 'Inter', sans-serif; color: white; margin: 0; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); border-radius: 20px; }
        .btn-gold { background: var(--accent); color: black; font-weight: 900; text-transform: uppercase; transition: 0.3s; border-radius: 10px; cursor: pointer; }
        #reader { width: 100% !important; border-radius: 15px; overflow: hidden; border: none !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- LOGIN -->
    <div id="login-container" class="w-full max-w-sm px-6 mt-20 text-center">
        <h1 class="text-2xl font-black uppercase italic mb-6">Panel <span class="text-yellow-500">Delegados</span></h1>
        <div class="glass p-8">
            <input type="text" id="userDni" placeholder="DNI Delegado" class="w-full bg-black/50 border border-yellow-500/30 p-4 rounded-lg mb-4 outline-none focus:border-yellow-500 text-white text-center">
            <input type="password" id="userPass" placeholder="Contraseña" class="w-full bg-black/50 border border-yellow-500/30 p-4 rounded-lg mb-6 outline-none focus:border-yellow-500 text-white text-center">
            <button onclick="intentarLogin()" class="btn-gold w-full py-4">Ingresar al Sistema</button>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="scanner-container" class="w-full max-w-lg px-4 py-8 hidden">
        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-col">
                <span id="label-turno" class="text-yellow-500 text-[10px] font-black uppercase tracking-widest">Turno: Detectando...</span>
                <h2 class="text-xl font-black italic uppercase">Control en Vivo</h2>
            </div>
            <button onclick="enviarManualmente()" class="bg-blue-600 text-[9px] font-black px-3 py-2 rounded-lg hover:bg-blue-500">ENVIAR AHORA</button>
        </div>

        <div class="glass p-4 mb-6"><div id="reader"></div></div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-5 text-center border-b-2 border-yellow-500">
                <span class="text-[9px] text-gray-500 uppercase font-black block mb-1">Total Registros</span>
                <span id="contador" class="text-4xl font-black text-yellow-500">0</span>
            </div>
            <div class="glass p-5 text-center border-b-2 border-green-500">
                <span class="text-[9px] text-gray-500 uppercase font-black block mb-1">Estado QR</span>
                <span id="scan-status" class="text-[10px] font-black text-green-500 uppercase">Listo</span>
            </div>
        </div>

        <div class="glass p-6">
            <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 border-b border-white/10 pb-2">Últimos abordajes</h3>
            <div id="listaEscaneo" class="space-y-3 max-h-48 overflow-y-auto pr-2">
                <p class="text-[10px] text-gray-600 italic text-center py-10">Esperando escaneos del turno...</p>
            </div>
        </div>
    </div>

    <script>
        const DELEGADOS = ["71886034", "77570731"];
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJmiJyrmSmpP1yOmkKsB4vJBTDde18OPoVDOStyyN-rIBC2vtXI-wZ1OGzxmTgxpM/exec";
        
        let scannedData = JSON.parse(localStorage.getItem('scanned_unac')) || [];
        let delegadoDni = "";

        function intentarLogin() {
            const dni = document.getElementById('userDni').value;
            const pass = document.getElementById('userPass').value;
            if (DELEGADOS.includes(dni) && dni === pass) {
                delegadoDni = dni;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('scanner-container').classList.remove('hidden');
                initSystem();
            } else { alert("Acceso denegado"); }
        }

        function initSystem() {
            checkAutoReset();
            renderList();
            const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
            scanner.render(onScanSuccess);
        }

        function checkAutoReset() {
            const h = new Date().getHours();
            const lastReset = localStorage.getItem('last_reset_shift'); // 'morning' o 'evening'
            
            // Lógica de reseteo: 12 PM y 9 PM
            let currentShift = (h < 12) ? 'morning' : 'evening';
            document.getElementById('label-turno').innerText = "Turno: " + (h < 12 ? "05:15 AM" : "06:00 PM");

            if (lastReset && lastReset !== currentShift) {
                // Si cambió el turno, enviamos lo anterior y borramos
                if (scannedData.length > 0) enviarManualmente();
                scannedData = [];
                saveData();
            }
            localStorage.setItem('last_reset_shift', currentShift);
        }

        function onScanSuccess(decodedText) {
            try {
                const decrypted = atob(decodedText);
                if (!decrypted.startsWith("UNAC-OFFICIAL")) return;

                const [firma, dni, turno, fecha] = decrypted.split('|');

                // VALIDACIÓN DE UN SOLO USO
                if (scannedData.some(item => item.dni === dni)) {
                    playTone(false);
                    setStatus("YA ESCANEADO", "text-red-500");
                    return;
                }

                // ÉXITO
                const nuevoRegistro = {
                    dni: dni,
                    turno: turno,
                    fecha_ticket: fecha,
                    hora_scan: new Date().toLocaleTimeString(),
                    fecha_scan: new Date().toLocaleDateString(),
                    delegado: delegadoDni
                };

                scannedData.push(nuevoRegistro);
                saveData();
                renderList();
                playTone(true);
                setStatus("VÁLIDO ✅", "text-green-500");

            } catch (e) { setStatus("QR NO VÁLIDO", "text-red-500"); }
        }

        function renderList() {
            document.getElementById('contador').innerText = scannedData.length;
            const lista = document.getElementById('listaEscaneo');
            if (scannedData.length === 0) {
                lista.innerHTML = '<p class="text-[10px] text-gray-600 italic text-center py-10">Sin registros</p>';
                return;
            }
            lista.innerHTML = scannedData.map(item => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border-l-4 border-yellow-500">
                    <div class="flex flex-col">
                        <span class="text-[11px] font-black uppercase">ALUMNO: ${item.dni}</span>
                        <span class="text-[8px] text-gray-500">${item.turno} | Ticket: ${item.fecha_ticket}</span>
                    </div>
                    <span class="text-[10px] font-bold text-yellow-500">${item.hora_scan}</span>
                </div>
            `).reverse().join('');
        }

        function setStatus(txt, colorClass) {
            const el = document.getElementById('scan-status');
            el.innerText = txt;
            el.className = `text-[10px] font-black uppercase ${colorClass}`;
        }

        function playTone(success) {
            const audio = new Audio(success ? 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3' : 'https://assets.mixkit.co/active_storage/sfx/2873/2873-preview.mp3');
            audio.play();
        }

        function saveData() { localStorage.setItem('scanned_unac', JSON.stringify(scannedData)); }

        async function enviarManualmente() {
            if (scannedData.length === 0) return alert("No hay datos para enviar.");
            
            const btn = document.querySelector('button[onclick="enviarManualmente()"]');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(scannedData)
                });
                alert("Sincronización Exitosa con Excel");
                // Después de enviar, si es cambio de turno o manual, el usuario decide si limpiar
                if(confirm("¿Deseas limpiar la lista del panel ahora?")) {
                    scannedData = [];
                    saveData();
                    renderList();
                }
            } catch (e) { alert("Error de red al enviar"); }
            btn.innerText = "ENVIAR AHORA";
            btn.disabled = false;
        }
    </script>
</body>
</html>

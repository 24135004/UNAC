<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Pase de Movilidad</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow-x: hidden; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .main-wrapper { 
            position: relative; z-index: 10; 
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.4) 0%, rgba(5, 5, 5, 1) 100%), url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920'); 
            background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; width: 100%; 
        }

        header { width: 100%; max-width: 1200px; padding: 30px 20px; z-index: 1000; margin: 0 auto; }
        .nav-link { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; position: relative; transition: 0.3s; }
        .nav-link:hover, .active-link { color: var(--accent); }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -6px; left: 0; background: var(--accent); transition: width 0.3s; }
        .nav-link:hover::after, .active-link::after { width: 100%; }

        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); border-radius: 20px; }
        input[type="text"] { width: 100%; max-width: 400px; padding: 18px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--accent); color: #fff; border-radius: 12px; font-size: 1.2rem; text-align: center; outline: none; }
        .btn-search { background: var(--accent); color: #000; padding: 15px 40px; border-radius: 10px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; cursor: pointer; }
        
        .card-panorama {
            position: relative; overflow: hidden; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-size: cover; background-position: center; transition: 0.4s; cursor: pointer;
        }
        .card-t-img { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=800'); }
        .card-panorama.locked { filter: grayscale(1); opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .badge-img { padding: 4px 15px; border-radius: 20px; font-size: 10px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .badge-cerrado { background: #ef4444; color: white; }
        .badge-abierto { background: #10b981; color: white; }
        .shift-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; font-size: 45px; text-transform: uppercase; line-height: 1; }

        .ticket-white { background: #ffffff; color: #333333; border: 2px dashed #ffc107; border-radius: 15px; padding: 25px; width: 100%; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .asiento-num { color: #e53e3e; font-size: 80px; font-weight: 900; line-height: 1; margin: 5px 0; }
        .table-data { width: 100%; font-size: 10px; text-align: left; border-top: 1px solid #eee; margin-top: 20px; padding-top: 10px; }
        .table-data td { padding: 4px 0; font-weight: 900; text-transform: uppercase; }
        .table-data .val { text-align: right; color: #666; font-weight: 500; }
        #qrcode-p img { margin: 0 auto; border: 4px solid white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="flex justify-between items-center relative z-20 animate-fade-up">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center shadow-lg"><i class="fa-solid fa-bus text-black text-lg"></i></div>
                <div class="flex flex-col text-left leading-none uppercase">
                    <span class="text-[10px] font-black tracking-widest leading-none text-white">UNAC</span>
                    <span class="text-[9px] text-yellow-500 font-bold">Movilidad</span>
                </div>
            </div>
            <p id="live-clock" class="text-white font-mono text-lg font-bold opacity-70"></p>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-12 flex flex-col items-center">
            
            <div id="main-header" class="text-center mb-10 animate-fade-up">
                <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-4">Tickets <span class="text-yellow-500">Oficiales</span></h1>
            </div>

            <!-- PASO 1: VERIFICACIÓN -->
            <div id="step-verify" class="glass p-10 w-full max-w-xl mx-auto text-center mb-8 border-t-2 border-yellow-500 animate-fade-up">
                <input type="text" id="dniInput" placeholder="INGRESE SU DNI" maxlength="8">
                <div class="mt-6"><button class="btn-search" id="verifyBtn">Verificar Alumno</button></div>
            </div>

            <!-- PASO 2: SELECCIÓN -->
            <div id="step-selection" class="w-full max-w-xl mx-auto hidden animate-fade-up">
                <div class="glass p-6 mb-8 text-center border-l-4 border-yellow-500">
                    <h2 id="welcomeName" class="text-xl font-black uppercase italic text-white"></h2>
                    <p id="displayDni" class="text-[10px] text-gray-500 font-bold tracking-widest"></p>
                </div>

                <div id="card-tarde" class="card-panorama card-t-img" onclick="generarTicket('TARDE')">
                    <span id="badge-t" class="badge-img">Cerrado</span>
                    <div class="shift-title text-white">Turno Tarde</div>
                    <div class="salida-text text-white">SALIDA: 06:00 PM</div>
                    <p id="info-t" class="text-[9px] text-white/60 mt-3 uppercase font-bold tracking-widest"></p>
                </div>
            </div>

            <!-- PASO 3: TICKET FINAL -->
            <div id="step-ticket" class="w-full max-w-2xl mx-auto text-center hidden animate-fade-up">
                <div id="premium-ticket" class="ticket-white animate-fade-up">
                    <div class="fecha-ticket text-yellow-600 font-black text-xl" id="p-fecha"></div>
                    <div class="border-t border-gray-100 my-4"></div>
                    <p style="font-size: 13px; font-weight: bold; color: #444;">NÚMERO DE ASIENTO:</p>
                    <div class="asiento-num" id="p-asiento">--</div>
                    <div class="border-t border-gray-100 my-4"></div>
                    <table class="table-data">
                        <tr><td>Estudiante:</td><td class="val" id="td-nom"></td></tr>
                        <tr><td>DNI:</td><td class="val" id="td-dni"></td></tr>
                        <tr><td>Turno:</td><td class="val">TARDE</td></tr>
                    </table>
                    <div id="qrcode-p" class="my-6 flex justify-center"></div>
                    <p class="text-[9px] text-yellow-600 font-bold uppercase">Ticket prioritario asignado por orden de llegada</p>
                </div>
            </div>

        </main>
    </div>

    <script>
        const LINK_1_BD = 'https://script.google.com/macros/s/AKfycbwsrBKWFy0QQujSkHJ6Ybr_dlmm9S_LdWGyE0aagcJC_-e9bqRbSZrQuNlENM65fJiYSQ/exec';
        const LINK_2_SINCRO = 'https://script.google.com/macros/s/AKfycbxcimdYmvKhLPNSZ8JvA9qUz8B777fdJQ0LQ1B-iInLi_vnlHvKamg1HcTG06K5Mzaz/exec';

        // LA LISTA EXACTA EN ORDEN
        const LISTA_OFICIAL = [
            "70694926", "61313420", "70533533", "72995814", "75441962", 
            "71726830", "60882501", "74826659", "61268955", "74233547", 
            "60992185", "61508922", "77087281", "60496379", "75181015", 
            "61038909", "61331640", "70718321", "74647344", "72424198", 
            "71686600", "62744970", "74092525", "70850238", "74640542", 
            "77572173", "72869380", "60795944", "70632476", "70993479", 
            "71351971", "60166378", "73292433", "72607184", "70743121", 
            "70629809", "74539012", "61167232", "61057836", "70700848"
        ];

        let alumno = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
            const h = now.getHours();
            const m = now.getMinutes();

            const cardT = document.getElementById('card-tarde');
            const badgeT = document.getElementById('badge-t');
            const infoT = document.getElementById('info-t');

            // Habilitar solo si es 17:10 (5:10 PM) o más tarde
            const isOpenT = (h === 17 && m >= 10) || (h > 17);

            if (isOpenT) {
                cardT.classList.remove('locked'); 
                badgeT.innerText = "Abierto"; 
                badgeT.className = "badge-img badge-abierto";
                infoT.innerText = "¡Ya puedes generar tu ticket!";
            } else {
                cardT.classList.add('locked'); 
                badgeT.innerText = "Cerrado"; 
                badgeT.className = "badge-img badge-cerrado";
                infoT.innerText = "Disponible a las 5:10 PM";
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('verifyBtn').addEventListener('click', function() {
            const dni = document.getElementById('dniInput').value.trim();
            if(dni.length < 8) return alert("DNI Inválido");
            this.innerText = "VERIFICANDO...";
            
            fetch(`${LINK_1_BD}?dni=${dni}`).then(r => r.json()).then(data => {
                if(data.found) {
                    alumno = data; alumno.dni = dni;
                    document.getElementById('welcomeName').innerText = "HOLA, " + data.Estudiante;
                    document.getElementById('displayDni').innerText = "DNI: " + dni;
                    document.getElementById('step-verify').classList.add('hidden');
                    document.getElementById('step-selection').classList.remove('hidden');
                } else {
                    alert("DNI no registrado."); this.innerText = "Verificar Alumno";
                }
            });
        });

        function generarTicket(turno) {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();

            // Bloqueo de seguridad: No generar antes de las 5:10 PM
            if (h < 17 || (h === 17 && m < 10)) {
                alert("El sistema se habilitará exactamente a las 5:10 PM.");
                return;
            }

            document.getElementById('step-selection').classList.add('hidden');
            document.getElementById('step-ticket').classList.remove('hidden');

            // BUSCAR POSICIÓN EN LA LISTA
            const pos = LISTA_OFICIAL.indexOf(alumno.dni);
            const numeroAsiento = pos !== -1 ? (pos + 1) : "SN"; // Si no está en los 40, pone Sin Número

            const fecha = now.toLocaleDateString();
            document.getElementById('p-fecha').innerText = fecha;
            document.getElementById('p-asiento').innerText = numeroAsiento;
            document.getElementById('td-nom').innerText = alumno.Estudiante;
            document.getElementById('td-dni').innerText = alumno.dni;

            const dataQR = btoa(`UNAC|${alumno.dni}|${numeroAsiento}|${fecha}`);
            document.getElementById('qrcode-p').innerHTML = "";
            new QRCode(document.getElementById("qrcode-p"), { 
                text: dataQR, 
                width: 180, 
                height: 180,
                correctLevel : QRCode.CorrectLevel.H
            });

            // Registrar en Excel (Sincronización en segundo plano)
            fetch(`${LINK_2_SINCRO}?dni=${alumno.dni}&accion=solicitar_cola`).catch(e => console.log("Error reg"));
        }
    </script>
</body>
</html>

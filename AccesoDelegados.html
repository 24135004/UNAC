<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Panel de Control Delegados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería de Escaneo QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body { 
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }
        input {
            width: 100%; background: rgba(0,0,0,0.5) !important;
            border: 1px solid rgba(255,193,7,0.3) !important;
            color: white !important; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; outline: none; text-align: center;
        }
        input:focus { border-color: var(--accent) !important; }
        .btn-gold {
            background: var(--accent); color: black;
            width: 100%; padding: 15px; border-radius: 10px;
            font-weight: 900; text-transform: uppercase; transition: 0.3s;
            cursor: pointer;
        }
        .btn-gold:hover { transform: scale(1.02); background: white; }
        
        #reader {
            width: 100% !important; border: none !important;
            border-radius: 15px; overflow: hidden;
            background: black;
        }
        /* Ocultar interfaz automática de la librería */
        #reader__dashboard, #reader img { display: none !important; }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Notificación Rápida de Escaneo */
        #fast-notif {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; background: #10b981; color: white; padding: 20px 30px;
            border-radius: 15px; text-align: center; font-weight: 900;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.6);
            display: none; pointer-events: none; border: 2px solid white;
            width: 80%;
        }
    </style>
</head>
<body>

    <!-- CABECERA ESTILO ORIGINAL -->
    <header class="w-full max-w-lg p-6 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-user-shield text-black text-lg"></i>
            </div>
            <div class="flex flex-col text-left leading-none uppercase">
                <span class="text-[10px] font-black tracking-widest leading-none">UNAC</span>
                <span class="text-[9px] text-yellow-500 font-bold">Delegados</span>
            </div>
        </div>
        <button onclick="window.close()" class="text-[10px] font-black text-gray-500 uppercase tracking-widest hover:text-red-500 transition">
            Cerrar Panel <i class="fa-solid fa-xmark ml-1"></i>
        </button>
    </header>

    <!-- SECCIÓN 1: LOGIN -->
    <div id="login-container" class="w-full max-w-sm px-6 mt-10 text-center animate-fade-in">
        <div class="mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter">Acceso <span class="text-yellow-500">Restringido</span></h1>
            <p class="text-gray-500 text-[10px] tracking-widest uppercase mt-2">Ingrese sus credenciales de delegado</p>
        </div>

        <div class="glass p-8">
            <div class="text-left mb-4">
                <label class="text-[9px] font-black text-yellow-500 uppercase tracking-widest ml-1">Documento DNI</label>
                <input type="text" id="userDni" placeholder="7XXXXXXX" maxlength="8">
                
                <label class="text-[9px] font-black text-yellow-500 uppercase tracking-widest ml-1">Contraseña</label>
                <input type="password" id="userPass" placeholder="••••••••">
            </div>
            <button onclick="intentarLogin()" class="btn-gold shadow-lg shadow-yellow-500/20">Entrar al Sistema</button>
            <p id="errorLogin" class="text-red-500 text-[10px] font-bold mt-4 hidden uppercase tracking-widest">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- SECCIÓN 2: ESCÁNER Y ESTADÍSTICAS -->
    <div id="scanner-container" class="w-full max-w-lg px-4 py-4 hidden animate-fade-in">
        
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <h2 class="text-xl font-black italic uppercase">Panel de <span class="text-yellow-500">Control</span></h2>
                <p id="delegadoNombre" class="text-gray-500 text-[9px] uppercase font-bold tracking-widest"></p>
            </div>
            <button onclick="regresarLogin()" class="bg-white/5 border border-white/10 text-[9px] px-3 py-1.5 rounded-lg font-black uppercase text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Regresar
            </button>
        </div>

        <!-- ESCÁNER CON BOTONES PERSONALIZADOS -->
        <div class="glass p-4 mb-6 relative">
            <div class="flex gap-2 mb-4">
                <button onclick="controlCamara(true)" class="flex-1 bg-yellow-500 text-black font-black py-2 rounded-lg text-[10px] uppercase">
                    <i class="fa-solid fa-camera mr-1"></i> Activar Cámara
                </button>
                <button onclick="controlCamara(false)" class="flex-1 bg-red-600 text-white font-black py-2 rounded-lg text-[10px] uppercase">
                    <i class="fa-solid fa-video-slash mr-1"></i> Apagar
                </button>
            </div>

            <div id="reader"></div>

            <!-- NOTIFICACIÓN RELÁMPAGO -->
            <div id="fast-notif">
                <i class="fa-solid fa-check-circle text-4xl mb-2"></i><br>
                <span class="text-lg uppercase font-black italic tracking-tighter">Escaneo Verificado</span><br>
                <span id="notif-time" class="text-[9px] opacity-80"></span>
            </div>
        </div>

        <!-- ESTADÍSTICAS EN GRID -->
        <div class="grid grid-cols-2 gap-4 mb-6 text-center">
            <div class="glass p-5 border-b-2 border-yellow-500">
                <span class="text-[9px] text-gray-500 uppercase font-black block mb-1">Pasajeros Hoy</span>
                <span id="contador" class="text-4xl font-black text-yellow-500">0</span>
            </div>
            <div class="glass p-5 border-b-2 border-green-500">
                <span class="text-[9px] text-gray-500 uppercase font-black block mb-1">Estado Lector</span>
                <span id="scan-status" class="text-[10px] font-black text-green-500 uppercase">En Espera</span>
            </div>
        </div>

        <!-- HISTORIAL -->
        <div class="glass p-6 mb-6">
            <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 border-b border-white/10 pb-2 flex justify-between">
                <span>Registro de Abordaje</span>
                <span id="label-turno" class="text-yellow-500">TURNO: --</span>
            </h3>
            <div id="listaEscaneo" class="space-y-3 max-h-52 overflow-y-auto pr-2"></div>
        </div>

        <!-- BOTÓN SINCRONIZAR -->
        <button onclick="enviarYReiniciar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase text-xs transition shadow-xl mb-10">
            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Finalizar y Sincronizar Excel
        </button>
    </div>

    <script>
        const DELEGADOS = ["71886034", "77570731", "63229248"];
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJmiJyrmSmpP1yOmkKsB4vJBTDde18OPoVDOStyyN-rIBC2vtXI-wZ1OGzxmTgxpM/exec";
        
        let scannedData = JSON.parse(localStorage.getItem('scanned_unac')) || [];
        let delegadoActivo = "";
        let html5Qr;

        function intentarLogin() {
            const dni = document.getElementById('userDni').value;
            const pass = document.getElementById('userPass').value;
            if (DELEGADOS.includes(dni) && dni === pass) {
                delegadoActivo = dni;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('scanner-container').classList.remove('hidden');
                document.getElementById('delegadoNombre').innerText = "Delegado ID: " + dni;
                renderList();
                const h = new Date().getHours();
                document.getElementById('label-turno').innerText = "TURNO: " + (h < 12 ? 'MAÑANA' : 'TARDE');
            } else {
                document.getElementById('errorLogin').classList.remove('hidden');
            }
        }

        function controlCamara(encender) {
            if (encender) {
                if(!html5Qr) html5Qr = new Html5Qrcode("reader");
                html5Qr.start(
                    { facingMode: "environment" }, // FORZAR CÁMARA POSTERIOR
                    { fps: 20, qrbox: { width: 250, height: 250 } },
                    onScanSuccess
                ).catch(err => console.error("Error cámara: ", err));
                document.getElementById('scan-status').innerText = "ESCANEANDO...";
            } else {
                if(html5Qr) html5Qr.stop().then(() => {
                    document.getElementById('scan-status').innerText = "APAGADO";
                });
            }
        }

        function regresarLogin() {
            controlCamara(false);
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('scanner-container').classList.add('hidden');
        }

        async function onScanSuccess(decodedText) {
            try {
                const decrypted = atob(decodedText);
                if (!decrypted.startsWith("UNAC-OFFICIAL")) return;

                const [firma, dniAlumno, turno, fecha] = decrypted.split('|');

                if (scannedData.some(item => item.dni === dniAlumno)) {
                    notificar("YA USADO", false);
                    return alert("⚠️ ESTE DNI YA FUE REGISTRADO.");
                }

                // REGISTRO LOCAL
                const registro = {
                    dni: dniAlumno,
                    turno: turno,
                    hora_scan: new Date().toLocaleTimeString(),
                    delegado: delegadoActivo
                };

                scannedData.push(registro);
                localStorage.setItem('scanned_unac', JSON.stringify(scannedData));
                
                // NOTIFICACIÓN RELÁMPAGO VISUAL
                const fastNotif = document.getElementById('fast-notif');
                document.getElementById('notif-time').innerText = registro.hora_scan;
                fastNotif.style.display = "block";
                setTimeout(() => fastNotif.style.display = "none", 1500);

                renderList();
                notificar("VÁLIDO ✅", true);

                // --- SINCRONIZACIÓN INSTANTÁNEA CON TICKETS ---
                // Envía señal inmediata al servidor para liberar la ventana del alumno
                fetch(`${SCRIPT_URL}?dni=${dniAlumno}&accion=marcar_asistencia`, {
                    method: 'POST',
                    mode: 'no-cors'
                });

            } catch (e) {
                console.log("Error de lectura");
            }
        }

        function renderList() {
            document.getElementById('contador').innerText = scannedData.length;
            const lista = document.getElementById('listaEscaneo');
            if (scannedData.length === 0) {
                lista.innerHTML = '<p class="text-[10px] text-gray-600 italic text-center py-6">No hay registros.</p>';
                return;
            }
            lista.innerHTML = scannedData.map(item => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border-l-4 border-yellow-500 animate-fade-in mb-2">
                    <div class="flex flex-col">
                        <span class="text-[11px] font-black uppercase text-white">ALUMNO: ${item.dni}</span>
                        <span class="text-[8px] text-gray-500 uppercase font-bold">${item.turno}</span>
                    </div>
                    <span class="text-[10px] font-bold text-yellow-500">${item.hora_scan}</span>
                </div>
            `).reverse().join('');
        }

        function notificar(msg, exito) {
            const el = document.getElementById('scan-status');
            el.innerText = msg;
            el.className = `text-[10px] font-black uppercase ${exito ? 'text-green-500' : 'text-red-500'}`;
            new Audio(exito ? 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3' : 'https://assets.mixkit.co/active_storage/sfx/2873/2873-preview.mp3').play().catch(()=>{});
        }

        async function enviarYReiniciar() {
            if (scannedData.length === 0) return alert("No hay datos.");
            if (!confirm("¿Deseas enviar y limpiar el panel?")) return;

            const btn = document.querySelector('button[onclick="enviarYReiniciar()"]');
            btn.innerText = "SINCRONIZANDO...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ accion: "finalizar_turno", datos: scannedData })
                });
                alert("✅ Datos sincronizados correctamente.");
                scannedData = [];
                localStorage.removeItem('scanned_unac');
                renderList();
            } catch (e) {
                alert("Error de conexión al Excel.");
            }
            btn.innerText = "Finalizar y Sincronizar Excel";
            btn.disabled = false;
        }
    </script>
</body>
</html>

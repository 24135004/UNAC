<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Panel de Control Delegados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- LIBRERÍAS FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body { 
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }
        input {
            width: 100%; background: rgba(0,0,0,0.5) !important;
            border: 1px solid rgba(255,193,7,0.3) !important;
            color: white !important; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; outline: none; text-align: center;
        }
        input:focus { border-color: var(--accent) !important; }
        .btn-gold {
            background: var(--accent); color: black;
            width: 100%; padding: 15px; border-radius: 10px;
            font-weight: 900; text-transform: uppercase; transition: 0.3s;
            cursor: pointer;
        }
        .btn-gold:hover { transform: scale(1.02); background: white; }
        
        #reader {
            width: 100% !important; border: none !important;
            border-radius: 15px; overflow: hidden;
        }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        #flash-notif {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; background: #10b981; color: white; padding: 25px 50px;
            border-radius: 20px; font-weight: 900; text-align: center;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.6); display: none;
            border: 2px solid white; pointer-events: none;
        }
        .notif-error { background: #ef4444 !important; box-shadow: 0 0 50px rgba(239, 68, 68, 0.6) !important; }

        /* Estilos de botones de horario (Sincronizados con tu diseño) */
        .btn-horario {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #555;
            padding: 15px 5px; border-radius: 12px;
            font-weight: 900; text-transform: uppercase; font-size: 10px;
            transition: 0.3s; cursor: pointer;
        }
        .active-6pm { background: #0284c7 !important; color: white !important; border-color: #38bdf8 !important; box-shadow: 0 0 15px rgba(2, 132, 199, 0.4); }
        .active-10pm { background: #7c3aed !important; color: white !important; border-color: #a78bfa !important; box-shadow: 0 0 15px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>

    <div id="flash-notif">
        <i id="flash-icon" class="fa-solid fa-circle-check text-5xl mb-2"></i><br>
        <span id="flash-text" class="text-2xl uppercase italic tracking-tighter">Escaneo Verificado</span>
    </div>

    <header class="w-full max-w-lg p-6 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-user-shield text-black text-lg"></i>
            </div>
            <div class="flex flex-col text-left leading-none uppercase">
                <span class="text-[10px] font-black tracking-widest leading-none">UNAC</span>
                <span class="text-[9px] text-yellow-500 font-bold">Delegados</span>
            </div>
        </div>
        <button onclick="window.close()" class="text-[10px] font-black text-gray-500 uppercase tracking-widest hover:text-red-500 transition">
            Cerrar Panel <i class="fa-solid fa-xmark ml-1"></i>
        </button>
    </header>

    <div id="login-container" class="w-full max-w-sm px-6 mt-10 text-center animate-fade-in">
        <div class="mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter">Acceso <span class="text-yellow-500">Restringido</span></h1>
            <p class="text-gray-500 text-[10px] tracking-widest uppercase mt-2">Ingrese sus credenciales de delegado</p>
        </div>

        <div class="glass p-8">
            <div class="text-left mb-4">
                <label class="text-[9px] font-black text-yellow-500 uppercase tracking-widest ml-1">Documento DNI</label>
                <input type="text" id="userDni" placeholder="7XXXXXXX" maxlength="8">
                <label class="text-[9px] font-black text-yellow-500 uppercase tracking-widest ml-1">Contraseña</label>
                <input type="password" id="userPass" placeholder="••••••••">
            </div>
            <button onclick="intentarLogin()" class="btn-gold shadow-lg shadow-yellow-500/20">Entrar al Sistema</button>
            <p id="errorLogin" class="text-red-500 text-[10px] font-bold mt-4 hidden uppercase tracking-widest">Credenciales incorrectas</p>
        </div>
    </div>

    <div id="scanner-container" class="w-full max-w-lg px-4 py-4 hidden animate-fade-in">
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <h2 class="text-xl font-black italic uppercase">Panel de <span class="text-yellow-500">Control</span></h2>
                <p id="delegadoNombre" class="text-gray-500 text-[9px] uppercase font-bold tracking-widest"></p>
            </div>
            <button onclick="regresarLogin()" class="bg-white/5 border border-white/10 text-[9px] px-3 py-1.5 rounded-lg font-black uppercase text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Regresar
            </button>
        </div>

        <div class="glass p-4 mb-6">
            <div id="reader"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="glass p-4 border-b-2 border-yellow-500">
                <span class="text-[8px] text-gray-500 uppercase font-black block mb-1">Mis Escaneos</span>
                <span id="contador" class="text-3xl font-black text-yellow-500">0</span>
            </div>
            <div class="glass p-4 border-b-2 border-blue-500 relative">
                <span class="text-[8px] text-gray-500 uppercase font-black block mb-1">Total Global <i class="fa-solid fa-rotate ml-1 text-gray-500 hover:text-white cursor-pointer" onclick="actualizarTotalGlobal()"></i></span>
                <span id="contador-global" class="text-3xl font-black text-blue-500">0</span>
            </div>
        </div>

        <div class="glass p-3 border-b-2 border-green-500 text-center mb-6">
            <span class="text-[9px] text-gray-500 uppercase font-black block mb-1">Estado Lector</span>
            <span id="scan-status" class="text-[10px] font-black text-green-500 uppercase">Esperando...</span>
        </div>

        <div class="glass p-6 mb-6">
            <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 border-b border-white/10 pb-2 flex justify-between">
                <span>Registro Local (Solo Hoy)</span>
                <span id="label-turno" class="text-yellow-500">En vivo</span>
            </h3>
            <div id="listaEscaneo" class="space-y-3 max-h-64 overflow-y-auto pr-2">
                <p class="text-[10px] text-gray-600 italic text-center py-6">Sin registros válidos hoy.</p>
            </div>
        </div>

        <!-- --- NUEVOS BOTONES DE ACTIVACIÓN FIREBASE --- -->
        <div class="grid grid-cols-2 gap-3 mb-3">
            <button id="btn-6pm" onclick="toggleHorario('6pm')" class="btn-horario">
                <i class="fa-solid fa-clock mr-1"></i> Ticket 6:00 PM
            </button>
            <button id="btn-1015pm" onclick="toggleHorario('1015pm')" class="btn-horario">
                <i class="fa-solid fa-clock mr-1"></i> Ticket 10:15 PM
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-10">
            <button onclick="limpiarHistorial()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl uppercase text-[10px] transition shadow-xl">
                <i class="fa-solid fa-eraser mr-1"></i> Borrar Historial
            </button>
            <button id="btn-reiniciar" onclick="enviarYReiniciar()" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-4 rounded-xl uppercase text-[10px] transition shadow-xl">
                <i class="fa-solid fa-rotate mr-1"></i> Reiniciar Sistema
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE (DATOS REALES)
        const firebaseConfig = {
            apiKey: "AIzaSyBxaeAc2nq7iEeiLejvja3lKGwR4E09QS4",
            authDomain: "movilidad-unac.firebaseapp.com",
            databaseURL: "https://movilidad-unac-default-rtdb.firebaseio.com",
            projectId: "movilidad-unac",
            storageBucket: "movilidad-unac.firebasestorage.app",
            messagingSenderId: "245380540222",
            appId: "1:245380540222:web:d4ea08b7818bf89d682e6f"
        };
        
        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variables de estado para los botones
        let status6pm = false;
        let status1015pm = false;

        // Escuchar Firebase para sincronizar botones en tiempo real
        db.ref('horarios/ticket_6pm').on('value', (snap) => {
            status6pm = snap.val() || false;
            const btn = document.getElementById('btn-6pm');
            if(status6pm) {
                btn.classList.add('active-6pm');
                btn.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i> ACTIVO 6:00 PM';
            } else {
                btn.classList.remove('active-6pm');
                btn.innerHTML = '<i class="fa-solid fa-clock mr-1"></i> TICKET 6:00 PM';
            }
        });

        db.ref('horarios/ticket_1015pm').on('value', (snap) => {
            status1015pm = snap.val() || false;
            const btn = document.getElementById('btn-1015pm');
            if(status1015pm) {
                btn.classList.add('active-10pm');
                btn.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i> ACTIVO 10:15 PM';
            } else {
                btn.classList.remove('active-10pm');
                btn.innerHTML = '<i class="fa-solid fa-clock mr-1"></i> TICKET 10:15 PM';
            }
        });

        function toggleHorario(tipo) {
            if(tipo === '6pm') {
                db.ref('horarios/ticket_6pm').set(!status6pm);
            } else {
                db.ref('horarios/ticket_1015pm').set(!status1015pm);
            }
        }

        // --- LÓGICA ORIGINAL ---
        const DELEGADOS = ["71886034", "77570731", "63229248"];
        const LINK_POST_REINICIO = "TU_LINK_REINICIO"; 
        const LINK_MARCAR_ASISTENCIA = "TU_LINK_ASISTENCIA";
        
        let scannedData = JSON.parse(localStorage.getItem('scanned_unac')) || [];
        let delegadoActivo = "";
        let html5QrcodeScanner;
        let isScanningLocked = false;

        function intentarLogin() {
            const dni = document.getElementById('userDni').value;
            const pass = document.getElementById('userPass').value;
            if (DELEGADOS.includes(dni) && dni === pass) {
                delegadoActivo = dni;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('scanner-container').classList.remove('hidden');
                document.getElementById('delegadoNombre').innerText = "Delegado ID: " + dni;
                iniciarSistema();
            } else {
                document.getElementById('errorLogin').classList.remove('hidden');
            }
        }

        function regresarLogin() {
            if(html5QrcodeScanner) html5QrcodeScanner.clear();
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('scanner-container').classList.add('hidden');
        }

        function iniciarSistema() {
            renderList();
            actualizarTotalGlobal(); 
            setInterval(actualizarTotalGlobal, 15000); 

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess);
        }

        async function onScanSuccess(decodedText) {
            if (isScanningLocked) return;
            try {
                let decodedInfo = decodedText;
                if(!decodedText.includes('|')) {
                    try { decodedInfo = atob(decodedText); } catch(e) {}
                }
                const [dniAlumno, turno, fechaTicket] = decodedInfo.split('|');
                const fechaHoy = new Date().toLocaleDateString();
                isScanningLocked = true;
                setTimeout(() => { isScanningLocked = false; }, 3000);
                if (fechaTicket !== fechaHoy) { notificarFlash("TICKET CADUCADO", false); return; }
                if (scannedData.some(item => item.dni === dniAlumno)) { notificarFlash("YA ESCANEADO", false); return; }
                const registro = { dni: dniAlumno, turno: turno, hora_scan: new Date().toLocaleTimeString(), fecha_scan: fechaHoy, delegado: delegadoActivo };
                scannedData.push(registro);
                localStorage.setItem('scanned_unac', JSON.stringify(scannedData));
                notificarFlash("ESCANEO VERIFICADO", true);
                renderList();
                fetch(`${LINK_MARCAR_ASISTENCIA}?dni=${dniAlumno}&accion=marcar_asistencia&delegado=${delegadoActivo}`, { mode: 'no-cors' });
                setTimeout(actualizarTotalGlobal, 1500);
            } catch (e) { isScanningLocked = false; }
        }

        async function actualizarTotalGlobal() {
            try {
                const response = await fetch(`${LINK_MARCAR_ASISTENCIA}?accion=obtener_total`);
                const data = await response.json();
                if (data && typeof data.total !== 'undefined') {
                    document.getElementById('contador-global').innerText = data.total;
                }
            } catch (e) {}
        }

        function limpiarHistorial() {
            if (!confirm("¿Deseas borrar tu lista de escaneados local?")) return;
            scannedData = [];
            localStorage.removeItem('scanned_unac');
            renderList();
            notificarLector("Historial Local Limpio", true);
        }

        function notificarFlash(text, exito) {
            const flash = document.getElementById('flash-notif');
            const flashText = document.getElementById('flash-text');
            const flashIcon = document.getElementById('flash-icon');
            flashText.innerText = text;
            if (exito) {
                flash.classList.remove('notif-error');
                flashIcon.className = "fa-solid fa-circle-check text-5xl mb-2";
            } else {
                flash.classList.add('notif-error');
                flashIcon.className = "fa-solid fa-circle-xmark text-5xl mb-2";
            }
            flash.style.display = 'block';
            notificarLector(text, exito);
            setTimeout(() => { flash.style.display = 'none'; }, 2000);
        }

        function renderList() {
            document.getElementById('contador').innerText = scannedData.length;
            const lista = document.getElementById('listaEscaneo');
            if (scannedData.length === 0) {
                lista.innerHTML = '<p class="text-[10px] text-gray-600 italic text-center py-6">Sin registros válidos hoy.</p>';
                return;
            }
            lista.innerHTML = scannedData.map(item => `
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-xl border-l-4 border-yellow-500 mb-2">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <span class="text-sm font-black text-white">DNI: ${item.dni}</span>
                            <span class="text-[9px] font-bold text-yellow-500">${item.hora_scan}</span>
                        </div>
                    </div>
                </div>
            `).reverse().join('');
        }

        function notificarLector(msg, exito) {
            const el = document.getElementById('scan-status');
            el.innerText = msg;
            el.className = `text-[10px] font-black uppercase ${exito ? 'text-green-500' : 'text-red-500'}`;
        }

        async function enviarYReiniciar() {
            if (!confirm("Esto guardará los datos y limpiará el sistema. ¿Estás seguro?")) return;
            const btn = document.getElementById('btn-reiniciar');
            btn.innerHTML = 'REINICIANDO...';
            
            // Al reiniciar, también apagamos los tickets en Firebase
            db.ref('horarios/ticket_6pm').set(false);
            db.ref('horarios/ticket_1015pm').set(false);

            try {
                await fetch(LINK_POST_REINICIO, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ datos: scannedData }) });
                alert("✅ Sistema Reiniciado.");
                scannedData = [];
                localStorage.removeItem('scanned_unac');
                renderList();
            } catch (e) { alert("Error de conexión."); }
            btn.innerHTML = '<i class="fa-solid fa-rotate mr-1"></i> Reiniciar Sistema';
        }
    </script>
</body>
</html>

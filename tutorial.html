<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Interactivo UNAC | Paso a Paso</title>
    
    <!-- LIBRERÍAS ORIGINALES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* REPLICANDO TUS ESTILOS EXACTOS */
        :root { --accent: #ffc107; --dark: #050505; }
        body { background: #111; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }

        /* MARCO DE CELULAR REALISTA */
        .mockup-phone {
            width: 380px; height: 800px; background: var(--dark); border: 14px solid #1a1a1a; border-radius: 50px;
            position: relative; overflow: hidden; box-shadow: 0 0 100px rgba(0,0,0,0.8);
            transform: scale(0.9);
        }

        /* CURSOR PARA EL VIDEO */
        #virtual-tap {
            width: 40px; height: 40px; background: rgba(255, 193, 7, 0.5); border: 2px solid var(--accent);
            border-radius: 50%; position: absolute; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); display: none; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* CAJA DE SUBTÍTULOS */
        .subtitles {
            position: absolute; bottom: 100px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.95); padding: 15px; border-radius: 15px;
            border-left: 5px solid var(--accent); z-index: 11000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* INTEGRACIÓN DE TU DISEÑO ORIGINAL DENTRO DEL MOCKUP */
        iframe { width: 100%; height: 100%; border: none; }

        .btn-play {
            background: var(--accent); color: black; font-weight: 900; padding: 15px 40px;
            border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4); transition: 0.3s;
        }
        .btn-play:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="mockup-phone" id="phone-ui">
        <!-- El cursor que simula el toque del dedo -->
        <div id="virtual-tap"></div>

        <!-- El cuadro de texto informativo -->
        <div id="tutorial-info" class="subtitles">
            <p id="info-text" class="text-white text-xs font-bold leading-snug"></p>
        </div>

        <!-- Contenedor que simula la web -->
        <div id="web-simulator" class="w-full h-full overflow-y-auto bg-black" style="zoom: 0.8;">
            <!-- AQUÍ SE REPLICA TU CÓDIGO -->
             <div id="simulated-content">
                 <!-- Se inyectará vía JS para controlarlo -->
             </div>
        </div>
    </div>

    <button onclick="startTutorialVideo()" id="play-btn" class="btn-play">
        <i class="fa-solid fa-circle-play text-2xl"></i> VER TUTORIAL PASO A PASO
    </button>

    <script>
        const tap = document.getElementById('virtual-tap');
        const info = document.getElementById('tutorial-info');
        const infoText = document.getElementById('info-text');

        // FUNCIÓN DE VOZ PARA EL VIDEO
        function narrar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'es-ES';
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
            info.style.display = 'block';
            infoText.innerText = texto;
        }

        // SIMULACIÓN DE MOVIMIENTO
        async function moverDedo(selector, xOff = 0, yOff = 0) {
            const el = document.querySelector(selector);
            const rect = el.getBoundingClientRect();
            const phone = document.getElementById('phone-ui').getBoundingClientRect();
            
            tap.style.display = 'block';
            tap.style.left = (rect.left - phone.left + rect.width / 2 + xOff) + 'px';
            tap.style.top = (rect.top - phone.top + rect.height / 2 + yOff) + 'px';
            
            await new Promise(r => setTimeout(r, 1200));
        }

        async function escribir(id, texto) {
            const el = document.getElementById(id);
            for(let c of texto) {
                el.value += c;
                await new Promise(r => setTimeout(r, 100));
            }
        }

        // LÓGICA DEL VIDEO TUTORIAL
        async function startTutorialVideo() {
            document.getElementById('play-btn').style.display = 'none';
            
            // Inyectar tu estructura original en el simulador
            const content = document.getElementById('simulated-content');
            content.innerHTML = `
                <div class="main-wrapper p-4 min-h-screen">
                    <div id="s-verify" class="glass p-10 text-center mt-20 border-t-2 border-yellow-500">
                        <p class="text-[11px] text-gray-400 uppercase font-bold mb-6">Ingrese su DNI</p>
                        <input type="text" id="dniSim" placeholder="DOCUMENTO DNI" class="bg-black/50 border border-yellow-500 p-3 w-full rounded text-white text-center">
                        <button id="btnSim" class="bg-yellow-500 text-black font-black w-full mt-4 p-3 rounded">Verificar Alumno</button>
                    </div>
                    <!-- MODAL ERROR SIMULADO -->
                    <div id="errSim" class="fixed inset-0 bg-black/95 z-[5000] hidden flex items-center justify-center p-10">
                        <div class="border-2 border-red-500 p-10 rounded-3xl text-center">
                             <i class="fa-solid fa-circle-xmark text-red-500 text-6xl mb-4"></i>
                             <h2 class="text-white font-black uppercase">No Verificado</h2>
                             <p class="text-gray-400 text-xs">Su DNI no está registrado.</p>
                             <button class="bg-red-500 text-white p-2 mt-4 rounded-xl text-[10px] font-bold">Ir a Registro</button>
                        </div>
                    </div>
                    <!-- SELECCIÓN SIMULADA -->
                    <div id="s-selection" class="hidden mt-10">
                        <div class="glass p-4 border-l-4 border-yellow-500 flex items-center gap-4 mb-10">
                            <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-yellow-500"><i class="fa-solid fa-user-graduate"></i></div>
                            <div><p class="text-white font-black text-xs">JUAN PÉREZ GARCÍA</p><p class="text-green-500 text-[8px] font-bold">ALUMNO HABILITADO</p></div>
                        </div>
                        <div id="card-t" class="card-panorama border-2 border-yellow-500 rounded-3xl h-40 flex flex-col items-center justify-center" style="background: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400'); background-size: cover;">
                            <span class="bg-green-500 text-[8px] px-2 py-1 rounded-full text-white mb-2">ABIERTO</span>
                            <p class="text-white font-black text-3xl italic italic uppercase">TARDE</p>
                            <p class="text-yellow-500 font-bold text-[10px]">SALIDA: 06:00 PM</p>
                        </div>
                    </div>
                    <!-- CARGA 3D SIMULADA -->
                    <div id="s-loading" class="fixed inset-0 bg-black z-[6000] hidden flex flex-col items-center justify-center">
                        <div id="canvas-sim"></div>
                        <p class="text-yellow-500 font-black text-xs uppercase tracking-[4px] mt-4 animate-pulse">recolectando tus datos</p>
                    </div>
                    <!-- TICKET SIMULADO -->
                    <div id="s-ticket" class="hidden mt-4">
                        <div class="bg-white rounded-2xl overflow-hidden text-center text-black">
                             <div class="bg-yellow-500 p-4 font-black">PASE VIP VERIFICADO</div>
                             <div class="p-6">
                                 <p class="text-xs font-bold text-gray-500">ASIENTO ASIGNADO:</p>
                                 <p class="text-6xl font-black text-red-600">24</p>
                                 <div class="border-2 border-yellow-500 p-2 inline-block my-4"><i class="fa-solid fa-qrcode text-6xl"></i></div>
                                 <p class="text-[8px] font-bold uppercase">Presentar al delegado</p>
                             </div>
                        </div>
                    </div>
                </div>
            `;

            // ESCENA 1: ERROR DE REGISTRO
            narrar("Hola. Primero ingresaremos un DNI que no está en el sistema para que veas qué sucede.");
            await moverDedo('#dniSim');
            await escribir('dniSim', '12345678');
            await moverDedo('#btnSim', 0, 0);
            document.getElementById('errSim').classList.remove('hidden');
            
            await new Promise(r => setTimeout(r, 3000));
            narrar("Si no estás registrado, saldrá este aviso. Deberás ir al botón rojo para registrarte oficialmente.");
            
            // ESCENA 2: INGRESO EXITOSO
            await new Promise(r => setTimeout(r, 4000));
            document.getElementById('errSim').classList.add('hidden');
            document.getElementById('dniSim').value = "";
            narrar("Ahora ingresaremos con un DNI verificado.");
            await escribir('dniSim', '77441122');
            await moverDedo('#btnSim');
            document.getElementById('s-verify').classList.add('hidden');
            document.getElementById('s-selection').classList.remove('hidden');

            // ESCENA 3: HORARIO
            await new Promise(r => setTimeout(r, 2000));
            narrar("Dentro del sistema, verás el Turno Tarde. Muy importante: Este se habilita exactamente a las 5 y 10 de la tarde.");
            await moverDedo('#card-t');

            // ESCENA 4: CARGA 10S
            await new Promise(r => setTimeout(r, 3000));
            narrar("Al solicitar tu ticket, el sistema procesará tu información durante 10 segundos. No cierres la ventana.");
            document.getElementById('s-selection').classList.add('hidden');
            document.getElementById('s-loading').style.display = 'flex';
            
            // Iniciar animacion 3D replica
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(250, 250);
            document.getElementById('canvas-sim').appendChild(renderer.domElement);
            const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(1, 0.3, 100, 16), new THREE.MeshBasicMaterial({ color: 0xffc107, wireframe: true }));
            scene.add(mesh); camera.position.z = 3;
            function anim() { requestAnimationFrame(anim); mesh.rotation.x += 0.03; renderer.render(scene, camera); }
            anim();

            await new Promise(r => setTimeout(r, 10000)); // 10 SEGUNDOS REALES

            // ESCENA 5: TICKET
            document.getElementById('s-loading').style.display = 'none';
            document.getElementById('s-ticket').classList.remove('hidden');
            narrar("¡Listo! Tu ticket se ha generado. Si tu número es del 1 al 40, aparecerá tu asiento. Si es mayor, solo el código QR.");
            
            await new Promise(r => setTimeout(r, 5000));
            narrar("Muestra este QR al delegado al subir al bus. ¡Buen viaje!");
            await new Promise(r => setTimeout(r, 3000));
            info.style.display = 'none';
            tap.style.display = 'none';
        }
    </script>

</body>
</html>

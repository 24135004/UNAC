<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC Music | Viaje Sin Anuncios</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes e Íconos -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #030303; --surface: #121212; --surface-hover: #2a2a2a; }
        
        body, html { margin: 0; padding: 0; height: 100vh; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow: hidden; user-select: none; }

        /* Estilo Scrollbar (Oculto para ser como app nativa) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Header tipo YouTube Music */
        .topbar { background: rgba(3, 3, 3, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Input Búsqueda */
        .search-box { background: #1f1f1f; border: 1px solid transparent; transition: 0.3s; color: white; border-radius: 8px; }
        .search-box:focus-within { background: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(255,193,7,0.1); }
        .search-box input { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 500; }

        /* Tarjetas de Canciones (Grilla Estilo YT Music) */
        .song-card { background: transparent; border-radius: 8px; padding: 12px; transition: 0.2s; cursor: pointer; position: relative; }
        .song-card:hover { background: var(--surface-hover); }
        .cover-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .cover-img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        
        /* Botón Play flotante sobre la imagen */
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
        .song-card:hover .play-overlay { opacity: 1; }
        .song-card:hover .cover-img { transform: scale(1.05); }
        .play-btn-hover { width: 48px; height: 48px; background: var(--accent); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateY(10px); transition: 0.3s; }
        .song-card:hover .play-btn-hover { transform: translateY(0); }

        /* Reproductor Fijo Inferior */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: #181818; border-top: 1px solid #282828; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        /* Controles Principales */
        .control-btn { color: #fff; opacity: 0.7; font-size: 18px; cursor: pointer; transition: 0.2s; background: none; border: none; }
        .control-btn:hover { opacity: 1; color: var(--accent); }
        .main-play-btn { width: 42px; height: 42px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: 0.2s; border: none; }
        .main-play-btn:hover { transform: scale(1.05); background: var(--accent); }

        /* Barras de Progreso (Inputs Range) */
        .progress-wrapper { position: absolute; top: -6px; left: 0; right: 0; height: 4px; background: transparent; cursor: pointer; }
        .progress-wrapper:hover input[type=range]::-webkit-slider-thumb { opacity: 1; transform: scale(1); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: #333; position: absolute; top: 0; margin: 0; cursor: pointer; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; margin-top: -4px; opacity: 0; transition: 0.2s; transform: scale(0.5); }
        
        /* Utilidades */
        .loader-pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col">

    <!-- TOPBAR -->
    <header class="topbar h-20 w-full flex items-center justify-between px-4 md:px-8 z-50 fixed top-0">
        <!-- Logo -->
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded flex items-center justify-center">
                <i class="fa-solid fa-play text-black text-xl ml-1"></i>
            </div>
            <div class="flex flex-col">
                <span class="font-black text-xl tracking-tighter leading-none" style="font-family: 'Montserrat', sans-serif;">UNAC Music</span>
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Viaje VIP</span>
            </div>
        </div>

        <!-- Buscador Central -->
        <div class="flex-grow max-w-2xl mx-4">
            <div class="search-box flex items-center px-4 py-3">
                <i class="fa-solid fa-magnifying-glass text-gray-400 text-lg mr-3"></i>
                <input type="text" id="searchInput" placeholder="Buscar canciones, artistas o podcasts para el viaje...">
            </div>
        </div>

        <!-- Badge Sin Anuncios -->
        <div class="hidden md:flex items-center">
            <span class="border border-yellow-500/30 bg-yellow-500/10 text-yellow-500 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-shield-halved"></i> Ad-Free Activado
            </span>
        </div>
    </header>

    <!-- ÁREA DE CONTENIDO -->
    <main class="flex-grow overflow-y-auto pt-24 pb-32 px-4 md:px-8" id="mainContainer">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-[10px] text-yellow-500 font-bold uppercase tracking-[3px] mb-1">Conexión Segura</p>
                    <h2 id="sectionTitle" class="text-3xl md:text-4xl font-black tracking-tight">Recomendados para ti</h2>
                </div>
                <div id="loadingIndicator" class="hidden text-yellow-500 text-sm font-bold flex items-center gap-2 loader-pulse">
                    <i class="fa-solid fa-circle-notch spinner"></i> Extrayendo audio puro...
                </div>
            </div>
            
            <!-- Grilla de Resultados -->
            <div id="resultsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                <!-- Se llenará con JS -->
            </div>

        </div>
    </main>

    <!-- REPRODUCTOR INFERIOR TIPO YOUTUBE MUSIC -->
    <div class="player-bar">
        
        <!-- Barra de progreso superior finita -->
        <div class="progress-wrapper">
            <input type="range" id="progressBar" value="0" min="0" max="100">
        </div>

        <!-- Lado Izquierdo: Info Canción -->
        <div class="flex items-center gap-4 w-[30%] min-w-[200px]">
            <img id="playerCover" src="https://images.unsplash.com/photo-1614149162883-504ce4d1ed92?q=80&w=150" class="w-12 h-12 rounded object-cover shadow-lg hidden md:block">
            <div class="flex flex-col overflow-hidden">
                <span id="playerTitle" class="text-sm font-bold text-white truncate w-full">Elige una pista</span>
                <span id="playerArtist" class="text-[11px] font-medium text-gray-400 truncate w-full mt-1">Listo para el viaje</span>
            </div>
        </div>

        <!-- Centro: Controles de Reproducción -->
        <div class="flex flex-col items-center justify-center w-[40%]">
            <div class="flex items-center gap-6 md:gap-8">
                <button class="control-btn hidden md:block"><i class="fa-solid fa-shuffle"></i></button>
                <button class="control-btn"><i class="fa-solid fa-backward-step"></i></button>
                
                <button id="playBtn" class="main-play-btn shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                    <i id="playIcon" class="fa-solid fa-play ml-1 text-black"></i>
                </button>
                
                <button class="control-btn"><i class="fa-solid fa-forward-step"></i></button>
                <button class="control-btn hidden md:block"><i class="fa-solid fa-repeat"></i></button>
            </div>
        </div>

        <!-- Lado Derecho: Tiempo y Volumen -->
        <div class="flex items-center justify-end w-[30%] gap-4 pr-2">
            <div class="text-[11px] font-medium text-gray-400 font-mono hidden md:block">
                <span id="currentTime">0:00</span> / <span id="durationTime">0:00</span>
            </div>
            <div class="flex items-center gap-2 ml-4 hidden lg:flex w-24">
                <i class="fa-solid fa-volume-high text-gray-400 text-xs"></i>
                <input type="range" id="volumeBar" value="100" min="0" max="100" class="relative w-full h-1 mt-0 bg-gray-600 rounded">
            </div>
        </div>
    </div>

    <!-- Etiqueta de Audio Real (Oculta) -->
    <audio id="audioPlayer"></audio>

    <script>
        // =========================================================================
        // MOTOR DE BÚSQUEDA ROBUSTO (API Piped con Balanceo Inteligente)
        // Extrae música de YTMusic sin anuncios y sin fallar.
        // =========================================================================
        
        // Tres servidores globales por si alguno se satura, pasa al siguiente
        const API_NODES = [
            "https://api.piped.projectsegfau.lt", 
            "https://pipedapi.kavin.rocks",
            "https://pipedapi.smnz.de"
        ];

        // Variables del DOM
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const sectionTitle = document.getElementById('sectionTitle');
        const loadingIndicator = document.getElementById('loadingIndicator');
        
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const playerCover = document.getElementById('playerCover');
        const progressBar = document.getElementById('progressBar');

        let isPlaying = false;

        // Función que intenta buscar en todos los servidores hasta lograrlo
        async function fetchAPI(endpoint) {
            for (let url of API_NODES) {
                try {
                    const res = await fetch(`${url}${endpoint}`);
                    if (!res.ok) continue; // Si falla, intenta el siguiente
                    return await res.json();
                } catch (e) {
                    console.warn("Nodo falló, saltando...");
                }
            }
            throw new Error("Todos los servidores saturados");
        }

        // 1. BUSCAR LA CANCIÓN
        async function searchMusic(query) {
            if(!query.trim()) return;
            
            resultsGrid.innerHTML = '';
            sectionTitle.innerText = "Buscando...";
            loadingIndicator.classList.remove('hidden');

            try {
                // Buscamos resultados generales
                const data = await fetchAPI(`/search?q=${encodeURIComponent(query)}&filter=all`);
                
                loadingIndicator.classList.add('hidden');
                sectionTitle.innerHTML = `Resultados para "${query}"`;

                // Filtramos videos cortos (canciones) y limpiamos datos basura
                const validTracks = data.items.filter(item => item.type === 'stream' && item.duration < 600); // Menos de 10 mins

                if(validTracks.length === 0) {
                    resultsGrid.innerHTML = '<p class="text-gray-400 col-span-full">No se encontraron resultados. Intenta otro nombre.</p>';
                    return;
                }

                renderGrid(validTracks);
            } catch (error) {
                loadingIndicator.classList.add('hidden');
                sectionTitle.innerText = "Error de conexión";
                resultsGrid.innerHTML = `<div class="col-span-full bg-red-500/10 border border-red-500/20 p-4 rounded-lg text-red-400 text-sm">
                    Los servidores globales están sobrecargados. Intenta de nuevo en unos segundos.
                </div>`;
            }
        }

        // 2. MOSTRAR RESULTADOS EN LA GRILLA
        function renderGrid(tracks) {
            resultsGrid.innerHTML = '';
            
            tracks.slice(0, 18).forEach(track => {
                // Limpiamos los títulos feos como (Official Video), etc.
                const cleanTitle = track.title.replace(/(\(|\[).*?(official|video|lyric|audio).*?(\)|\])/gi, '').trim();
                const cleanArtist = track.uploaderName.replace(/ - Topic|VEVO/gi, '').trim();

                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <div class="cover-wrapper">
                        <img src="${track.thumbnail}" class="cover-img">
                        <div class="play-overlay">
                            <div class="play-btn-hover"><i class="fa-solid fa-play ml-1"></i></div>
                        </div>
                    </div>
                    <div class="mt-3 px-1">
                        <h3 class="text-white font-bold text-sm truncate" title="${cleanTitle}">${cleanTitle}</h3>
                        <p class="text-gray-400 text-[11px] font-medium mt-1 truncate">${cleanArtist}</p>
                    </div>
                `;

                // Al hacer clic, buscar el audio real sin anuncios
                card.addEventListener('click', () => {
                    extractAudioAndPlay(track, cleanTitle, cleanArtist);
                });

                resultsGrid.appendChild(card);
            });
        }

        // 3. EXTRAER AUDIO PURO (Bypass Ads)
        async function extractAudioAndPlay(track, cleanTitle, cleanArtist) {
            // Actualizar interfaz visual inmediatamente
            playerTitle.innerText = cleanTitle;
            playerArtist.innerText = cleanArtist;
            playerCover.src = track.thumbnail;
            playerCover.classList.remove('hidden');
            
            // Estado de carga (Spinner en vez de icono play)
            audioPlayer.pause();
            playIcon.className = 'fa-solid fa-circle-notch spinner text-black';
            loadingIndicator.classList.remove('hidden');

            const videoId = track.url.split('?v=')[1];

            try {
                // Pedimos los links crudos del archivo al servidor
                const data = await fetchAPI(`/streams/${videoId}`);
                
                loadingIndicator.classList.add('hidden');

                // Filtramos para agarrar el archivo MP4/M4A (Mejor calidad/peso)
                let bestAudio = data.audioStreams.find(stream => stream.mimeType.includes('audio/mp4'));
                if (!bestAudio) bestAudio = data.audioStreams[0]; // Fallback

                // Lo metemos al reproductor oculto
                audioPlayer.src = bestAudio.url;
                playAudio();

            } catch (error) {
                loadingIndicator.classList.add('hidden');
                playIcon.className = 'fa-solid fa-play ml-1 text-black';
                alert("No se pudo obtener el audio. El enlace puede estar bloqueado. Intenta otra pista.");
            }
        }

        // 4. CONTROLES DEL REPRODUCTOR INFERIOR
        function playAudio() {
            audioPlayer.play().then(() => {
                isPlaying = true;
                playIcon.className = 'fa-solid fa-pause text-black';
            }).catch(e => console.log("Cargando stream..."));
        }

        function pauseAudio() {
            audioPlayer.pause();
            isPlaying = false;
            playIcon.className = 'fa-solid fa-play ml-1 text-black';
        }

        playBtn.addEventListener('click', () => {
            if(!audioPlayer.src) return;
            isPlaying ? pauseAudio() : playAudio();
        });

        // 5. BARRA DE TIEMPO
        audioPlayer.addEventListener('timeupdate', () => {
            if(!isNaN(audioPlayer.duration) && audioPlayer.duration > 0) {
                // Actualizar barra
                progressBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                
                // Actualizar textos de tiempo
                document.getElementById('currentTime').innerText = formatTime(audioPlayer.currentTime);
                document.getElementById('durationTime').innerText = formatTime(audioPlayer.duration);
                
                // Colorear el input range estilo YouTube (rojo/amarillo)
                const val = progressBar.value;
                progressBar.style.background = `linear-gradient(to right, var(--accent) ${val}%, #333 ${val}%)`;
            }
        });

        progressBar.addEventListener('input', (e) => {
            if(audioPlayer.duration) {
                audioPlayer.currentTime = (e.target.value / 100) * audioPlayer.duration;
            }
        });

        // 6. VOLUMEN
        const volumeBar = document.getElementById('volumeBar');
        if(volumeBar) {
            volumeBar.addEventListener('input', (e) => {
                audioPlayer.volume = e.target.value / 100;
                const val = e.target.value;
                volumeBar.style.background = `linear-gradient(to right, #fff ${val}%, #333 ${val}%)`;
            });
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // 7. EVENTOS GENERALES
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchMusic(searchInput.value);
                // Ocultar teclado en móviles
                searchInput.blur(); 
            }
        });

        // Carga inicial sugerida para la movilidad UNAC
        window.onload = () => {
            searchMusic('Éxitos Reggaeton 2024 Feid Bad Bunny'); 
        };

    </script>
</body>
</html>

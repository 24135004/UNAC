<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC Music | Search & Play</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes e Íconos -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; height: 100vh; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow: hidden; }
        
        .main-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 0%, rgba(30, 30, 30, 0.8) 0%, rgba(5, 5, 5, 1) 100%); }

        /* Scrollbar Spotify Style */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Componentes Glassmorphism UNAC */
        .glass-panel { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        
        /* Input de búsqueda */
        .search-bar { background: rgba(255,255,255,0.1); border: 1px solid transparent; transition: 0.3s; color: white; }
        .search-bar:focus { outline: none; border-color: var(--accent); background: rgba(0,0,0,0.5); box-shadow: 0 0 15px rgba(255,193,7,0.2); }

        /* Tarjetas de Canciones (Grilla) */
        .song-card { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 15px; transition: 0.3s; cursor: pointer; position: relative; }
        .song-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .song-card .play-overlay { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 20px; opacity: 0; transform: translateY(10px); transition: 0.3s; box-shadow: 0 5px 15px rgba(255,193,7,0.4); }
        .song-card:hover .play-overlay { opacity: 1; transform: translateY(0); }
        /* Indicador de canción activa */
        .song-card.active { border: 1px solid var(--accent); background: rgba(255,193,7,0.1); }

        /* Reproductor Inferior Fijo */
        .bottom-player { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; background: rgba(5, 5, 5, 0.95); border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(30px); }
        
        /* Controles Player */
        .control-btn { color: #b3b3b3; transition: 0.2s; font-size: 16px; background: transparent; border: none; cursor: pointer; }
        .control-btn:hover { color: #fff; transform: scale(1.1); }
        .play-btn { width: 40px; height: 40px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; cursor: pointer; border: none; }
        .play-btn:hover { transform: scale(1.05); background: var(--accent); }

        /* Barra de Progreso Fina */
        .progress-container { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: #a0a0a0; font-family: 'Inter', monospace; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 10px rgba(255,193,7,0.5); opacity: 0; transition: 0.2s; }
        .progress-container:hover input[type=range]::-webkit-slider-thumb { opacity: 1; }
        
        /* Loader */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 50px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col">

    <div class="main-bg"></div>

    <!-- HEADER / NAVEGACIÓN SUPERIOR -->
    <header class="w-full glass-panel h-20 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,193,7,0.4)] text-black text-xl">
                <i class="fa-brands fa-spotify"></i>
            </div>
            <div class="hidden md:flex flex-col text-left leading-none uppercase">
                <span class="text-[14px] font-black tracking-widest leading-none">UNAC</span>
                <span class="text-[10px] text-yellow-500 font-bold tracking-[3px]">Music Stream</span>
            </div>
        </div>

        <div class="flex-grow max-w-xl mx-4 relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="¿Qué quieres escuchar? (Ej. Bad Bunny, The Weeknd...)" 
                   class="search-bar w-full py-3 pl-12 pr-4 rounded-full text-sm font-semibold placeholder-gray-400">
        </div>

        <div class="w-10 h-10 rounded-full bg-gray-800 border-2 border-white/10 flex items-center justify-center overflow-hidden">
            <i class="fa-solid fa-user text-gray-400"></i>
        </div>
    </header>

    <!-- ÁREA PRINCIPAL DE RESULTADOS -->
    <main class="flex-grow overflow-y-auto p-6 pb-32">
        <div class="max-w-7xl mx-auto">
            <h2 id="sectionTitle" class="text-3xl font-black uppercase italic tracking-tighter text-white mb-6">Explorar <span class="text-yellow-500">Tendencias</span></h2>
            <div id="loading" class="loader"></div>
            <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Los resultados se inyectan aquí -->
            </div>
        </div>
    </main>

    <!-- REPRODUCTOR FIJO INFERIOR (ESTILO SPOTIFY) -->
    <div class="bottom-player">
        
        <!-- Info de la Canción (Izquierda) -->
        <div class="flex items-center gap-4 w-1/3">
            <img id="playerCover" src="https://images.unsplash.com/photo-1614149162883-504ce4d1ed92?q=80&w=100&auto=format&fit=crop" class="w-14 h-14 rounded-md object-cover border border-white/10 hidden md:block" alt="Cover">
            <div class="flex flex-col">
                <span id="playerTitle" class="text-sm font-bold text-white truncate max-w-[150px] md:max-w-[200px]">Selecciona una pista</span>
                <span id="playerArtist" class="text-[11px] font-semibold text-gray-400 truncate max-w-[150px] md:max-w-[200px] uppercase tracking-wider">Artista</span>
            </div>
            <button class="control-btn ml-4 hidden lg:block hover:text-yellow-500"><i class="fa-regular fa-heart"></i></button>
        </div>

        <!-- Controles Centrales (Centro) -->
        <div class="flex flex-col items-center justify-center w-full md:w-1/3 max-w-md gap-2">
            <div class="flex items-center gap-6">
                <button class="control-btn"><i class="fa-solid fa-shuffle"></i></button>
                <!-- BOTONES PREV Y NEXT AGREGADOS -->
                <button id="prevBtn" class="control-btn text-xl"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playBtn" class="play-btn"><i id="playIcon" class="fa-solid fa-play ml-1"></i></button>
                <button id="nextBtn" class="control-btn text-xl"><i class="fa-solid fa-forward-step"></i></button>
                <button class="control-btn"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="progress-container w-full hidden md:flex">
                <span id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100">
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <!-- Controles de Volumen (Derecha) -->
        <div class="w-1/3 flex justify-end items-center gap-3 hidden md:flex">
            <i class="fa-solid fa-list text-gray-400 text-sm hover:text-white cursor-pointer transition"></i>
            <i class="fa-solid fa-volume-high text-gray-400 text-sm hover:text-white cursor-pointer transition ml-4"></i>
            <input type="range" id="volumeBar" value="100" min="0" max="100" class="w-24 h-1 bg-white/20 rounded-full">
        </div>

    </div>

    <!-- Elemento de Audio Oculto -->
    <audio id="audioPlayer"></audio>

    <script>
        // Referencias del DOM
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const sectionTitle = document.getElementById('sectionTitle');
        const loading = document.getElementById('loading');
        
        // Referencias del Reproductor
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn'); // Nuevo
        const nextBtn = document.getElementById('nextBtn'); // Nuevo
        const playIcon = document.getElementById('playIcon');
        const playerCover = document.getElementById('playerCover');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const volumeBar = document.getElementById('volumeBar');

        let isPlaying = false;
        let currentPlaylist = [];
        let currentTrackIndex = -1; // Para saber qué canción se está reproduciendo

        // Función para Buscar Canciones (Usando API Pública de iTunes)
        async function searchMusic(query) {
            if(!query) return;
            
            resultsGrid.innerHTML = '';
            loading.style.display = 'block';
            sectionTitle.innerHTML = `Resultados para <span class="text-yellow-500">"${query}"</span>`;

            try {
                // Hacemos la petición a la API de Apple
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20`);
                const data = await response.json();
                
                // Filtramos canciones que SÍ tengan previewUrl
                currentPlaylist = data.results.filter(track => track.previewUrl);
                loading.style.display = 'none';

                if(currentPlaylist.length === 0) {
                    resultsGrid.innerHTML = '<p class="text-gray-400 text-sm col-span-full text-center py-10">No se encontraron resultados de audio.</p>';
                    return;
                }

                renderGrid(currentPlaylist);
            } catch (error) {
                loading.style.display = 'none';
                resultsGrid.innerHTML = '<p class="text-red-500 text-sm col-span-full text-center">Error de conexión al buscar música.</p>';
            }
        }

        // Renderizar las tarjetas de canciones
        function renderGrid(tracks) {
            resultsGrid.innerHTML = '';
            
            tracks.forEach((track, index) => {
                // Mejoramos la calidad de la imagen de portada de Apple
                const highResImage = track.artworkUrl100.replace('100x100bb', '600x600bb');
                
                const card = document.createElement('div');
                card.className = 'song-card';
                card.id = `song-card-${index}`; // Para aplicar estilos al reproducir
                card.innerHTML = `
                    <div class="relative w-full aspect-square mb-4 rounded-md overflow-hidden bg-gray-900 shadow-lg">
                        <img src="${highResImage}" class="w-full h-full object-cover" alt="Cover">
                        <div class="play-overlay">
                            <i class="fa-solid fa-play ml-1"></i>
                        </div>
                    </div>
                    <h3 class="text-white font-bold text-sm truncate">${track.trackName}</h3>
                    <p class="text-gray-400 font-semibold text-[11px] mt-1 uppercase tracking-wider truncate">${track.artistName}</p>
                `;

                // Evento al hacer click en la tarjeta (Reproducir)
                card.addEventListener('click', () => {
                    currentTrackIndex = index; // Actualizamos el índice actual
                    loadAndPlaySong(track, highResImage, index);
                });

                resultsGrid.appendChild(card);
            });
        }

        // Cargar Canción al Reproductor Inferior y darle Play
        function loadAndPlaySong(track, coverUrl, index) {
            // Actualizar diseño de la tarjeta activa
            document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`song-card-${index}`);
            if(activeCard) activeCard.classList.add('active');

            playerTitle.innerText = track.trackName;
            playerArtist.innerText = track.artistName;
            playerCover.src = coverUrl;
            playerCover.classList.remove('hidden');
            
            audioPlayer.src = track.previewUrl; // Enlace de audio de la API
            playAudio();
        }

        // Controladores Play / Pause
        function playAudio() {
            audioPlayer.play();
            isPlaying = true;
            playIcon.classList.remove('fa-play', 'ml-1');
            playIcon.classList.add('fa-pause');
            playBtn.style.background = 'var(--accent)';
        }

        function pauseAudio() {
            audioPlayer.pause();
            isPlaying = false;
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play', 'ml-1');
            playBtn.style.background = '#fff';
        }

        // Función para Siguiente Canción
        function playNext() {
            if (currentTrackIndex < currentPlaylist.length - 1) {
                currentTrackIndex++;
                const nextTrack = currentPlaylist[currentTrackIndex];
                const highResImage = nextTrack.artworkUrl100.replace('100x100bb', '600x600bb');
                loadAndPlaySong(nextTrack, highResImage, currentTrackIndex);
            } else {
                pauseAudio(); // Si es la última, se detiene
            }
        }

        // Función para Canción Anterior
        function playPrev() {
            if (currentTrackIndex > 0) {
                currentTrackIndex--;
                const prevTrack = currentPlaylist[currentTrackIndex];
                const highResImage = prevTrack.artworkUrl100.replace('100x100bb', '600x600bb');
                loadAndPlaySong(prevTrack, highResImage, currentTrackIndex);
            }
        }

        // EVENTOS DE LOS BOTONES
        playBtn.addEventListener('click', () => {
            if(!audioPlayer.src) return;
            isPlaying ? pauseAudio() : playAudio();
        });

        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);

        // ¡EL TRUCO MÁGICO!: Cuando la canción termine, pasa a la siguiente automáticamente
        audioPlayer.addEventListener('ended', playNext);

        // Actualizar barra de progreso de tiempo
        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            
            if(duration) {
                progressBar.value = (current / duration) * 100;
                currentTimeEl.innerText = formatTime(current);
                durationTimeEl.innerText = formatTime(duration);
            }
        });

        // Adelantar/Atrasar desde la barra
        progressBar.addEventListener('input', (e) => {
            if(audioPlayer.duration) {
                audioPlayer.currentTime = (e.target.value / 100) * audioPlayer.duration;
            }
        });

        // Control de Volumen
        volumeBar.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
        });

        // Formato de Tiempo (Minutos:Segundos)
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Evento de Búsqueda al presionar "Enter"
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchMusic(searchInput.value);
            }
        });

        // Cargar contenido por defecto al abrir la página
        window.onload = () => {
            searchMusic('Top Hits 2024'); 
        };

    </script>
</body>
</html>

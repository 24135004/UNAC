<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAC Music Premium | Experience</title>
    
    <!-- Frameworks y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --accent: #1DB954; /* Verde Premium */
            --bg-main: #0a0a0a;
            --bg-card: #181818;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Effects */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-item { transition: 0.3s; cursor: pointer; border-radius: 8px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); color: var(--accent); }
        .sidebar-item.active { background: var(--accent); color: black; font-weight: bold; }

        /* Song Cards */
        .song-card {
            background: var(--bg-card);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
        }
        .song-card:hover {
            transform: translateY(-8px);
            background: #282828;
            border-color: rgba(255,255,255,0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Login Overlay */
        #loginOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            display: flex; align-items: center; justify-content: center;
        }

        /* Player progress */
        .progress-bar-inner { height: 100%; background: var(--accent); border-radius: 10px; width: 0%; transition: width 0.1s linear; }
        
        /* YouTube Hidden Player */
        #yt-player { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="loginOverlay">
        <div class="w-full max-w-md p-8 text-center">
            <div class="mb-8 inline-block p-4 rounded-3xl bg-green-500/10">
                <i class="fa-brands fa-spotify text-6xl text-green-500 animate-pulse"></i>
            </div>
            <h1 class="text-4xl font-extrabold mb-2">UNAC <span class="text-green-500">Music</span></h1>
            <p class="text-gray-400 mb-8">Inicia sesión para escuchar música completa sin límites.</p>
            
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="Correo electrónico" required 
                       class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-green-500 transition">
                <input type="password" id="password" placeholder="Contraseña" required
                       class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-green-500 transition">
                <button type="submit" class="w-full bg-green-500 text-black font-bold py-4 rounded-xl hover:scale-105 transition transform active:scale-95">
                    Entrar ahora
                </button>
            </form>
            <p class="mt-6 text-sm text-gray-500">¿No tienes cuenta? <span class="text-white cursor-pointer hover:underline">Regístrate gratis</span></p>
        </div>
    </div>

    <!-- APP PRINCIPAL (Oculta hasta login) -->
    <div id="mainApp" class="hidden h-screen flex flex-col">
        <div class="flex flex-1 overflow-hidden">
            
            <!-- Sidebar -->
            <aside class="w-64 glass hidden md:flex flex-col p-6">
                <div class="flex items-center gap-3 mb-10 px-2">
                    <i class="fa-brands fa-spotify text-3xl text-green-500"></i>
                    <span class="font-bold text-xl tracking-tighter uppercase">UNAC Music</span>
                </div>
                
                <nav class="space-y-2 flex-grow">
                    <div class="sidebar-item active p-3 flex items-center gap-4">
                        <i class="fa-solid fa-house"></i> <span>Inicio</span>
                    </div>
                    <div class="sidebar-item p-3 flex items-center gap-4 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i> <span>Explorar</span>
                    </div>
                    <div class="sidebar-item p-3 flex items-center gap-4 text-gray-400">
                        <i class="fa-solid fa-compact-disc"></i> <span>Tu Biblioteca</span>
                    </div>
                </nav>

                <div class="mt-auto pt-6 border-t border-white/5">
                    <button onclick="logout()" class="flex items-center gap-3 text-red-400 hover:text-red-300 transition">
                        <i class="fa-solid fa-right-from-bracket"></i> <span>Cerrar Sesión</span>
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 flex flex-col">
                <!-- Header -->
                <header class="h-20 flex items-center justify-between px-8 z-10">
                    <div class="flex-grow max-w-2xl relative">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="searchInput" placeholder="¿Qué quieres escuchar hoy?" 
                               class="w-full bg-white/5 border border-white/10 py-3 pl-12 pr-4 rounded-full focus:bg-white/10 focus:outline-none focus:border-green-500 transition">
                    </div>
                    <div class="flex items-center gap-4 ml-4">
                        <span class="text-sm font-semibold hidden sm:block" id="userName">Premium User</span>
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-green-500 to-emerald-800 flex items-center justify-center text-black font-bold">
                            U
                        </div>
                    </div>
                </header>

                <!-- Scrollable View -->
                <section class="flex-1 overflow-y-auto px-8 pb-32">
                    <h2 id="viewTitle" class="text-3xl font-extrabold mb-8 mt-4">Descubrir <span class="text-green-500">Tendencias</span></h2>
                    
                    <div id="loader" class="hidden flex justify-center py-20">
                        <div class="w-10 h-10 border-4 border-green-500/20 border-t-green-500 rounded-full animate-spin"></div>
                    </div>

                    <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        <!-- Las canciones se inyectan aquí -->
                    </div>
                </section>
            </main>
        </div>

        <!-- Player Bar -->
        <footer class="h-24 bg-black border-t border-white/5 px-6 flex items-center justify-between z-50">
            <!-- Song Info -->
            <div class="flex items-center gap-4 w-1/4">
                <img id="pCover" src="https://via.placeholder.com/60" class="w-14 h-14 rounded-lg object-cover shadow-2xl" alt="">
                <div class="overflow-hidden">
                    <div id="pTitle" class="text-sm font-bold truncate">Sin reproducción</div>
                    <div id="pArtist" class="text-xs text-gray-400 truncate uppercase tracking-widest">Selecciona un tema</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center flex-1 max-w-xl">
                <div class="flex items-center gap-8 mb-2">
                    <button class="text-gray-400 hover:text-white transition"><i class="fa-solid fa-shuffle"></i></button>
                    <button id="prevBtn" class="text-2xl hover:scale-110 transition"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="playBtn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition shadow-lg">
                        <i id="playIcon" class="fa-solid fa-play text-xl ml-1"></i>
                    </button>
                    <button id="nextBtn" class="text-2xl hover:scale-110 transition"><i class="fa-solid fa-forward-step"></i></button>
                    <button class="text-gray-400 hover:text-white transition"><i class="fa-solid fa-repeat"></i></button>
                </div>
                <!-- Progress Bar -->
                <div class="w-full flex items-center gap-3">
                    <span id="currTime" class="text-[10px] text-gray-500 w-8 text-right font-mono">0:00</span>
                    <div id="progressCont" class="flex-1 h-1 bg-white/10 rounded-full cursor-pointer relative group">
                        <div class="progress-bar-inner"></div>
                        <div class="absolute -top-1 right-0 w-3 h-3 bg-white rounded-full hidden group-hover:block shadow-md"></div>
                    </div>
                    <span id="totalTime" class="text-[10px] text-gray-500 w-8 font-mono">0:00</span>
                </div>
            </div>

            <!-- Extra Controls -->
            <div class="w-1/4 flex justify-end items-center gap-4">
                <i class="fa-solid fa-volume-high text-gray-400"></i>
                <input type="range" id="volumeSlider" class="w-24 accent-green-500">
            </div>
        </footer>
    </div>

    <!-- Youtube Engine (Iframe Invisible para música completa) -->
    <div id="yt-player"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        let currentPlaylist = [];
        let currentIndex = -1;

        // --- SISTEMA DE AUTENTICACIÓN ---
        const loginForm = document.getElementById('loginForm');
        const loginOverlay = document.getElementById('loginOverlay');
        const mainApp = document.getElementById('mainApp');

        // Verificar sesión al cargar
        if(localStorage.getItem('isLoggedIn') === 'true') {
            showApp();
        }

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            // Simulación de login profesional
            localStorage.setItem('isLoggedIn', 'true');
            showApp();
        };

        function showApp() {
            loginOverlay.classList.add('hidden');
            mainApp.classList.remove('hidden');
            // Cargar hits iniciales
            setTimeout(() => searchTracks('Top Latino 2024'), 500);
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // --- MOTOR DE REPRODUCCIÓN (YOUTUBE API) ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '0', width: '0',
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onReady': () => console.log("Engine Ready")
                }
            });
        }

        async function searchTracks(query) {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('resultsGrid');
            
            loader.classList.remove('hidden');
            grid.innerHTML = '';
            
            // Usamos un proxy de búsqueda para simular resultados de YouTube/Música
            // En una app real usarías tu API Key de YouTube Data V3
            try {
                // NOTA: Para este ejemplo usamos un fetch a una API que devuelve videos de música
                const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_videos`);
                const data = await response.json();
                
                currentPlaylist = data.items.map(item => ({
                    id: item.url.split('v=')[1],
                    title: item.title,
                    artist: item.uploaderName,
                    cover: item.thumbnail
                }));

                renderGrid();
            } catch (error) {
                console.error("Error buscando música:", error);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderGrid() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = currentPlaylist.map((track, index) => `
                <div class="song-card p-4 rounded-xl cursor-pointer" onclick="playTrack(${index})">
                    <div class="relative group aspect-square mb-4">
                        <img src="${track.cover}" class="w-full h-full object-cover rounded-lg shadow-lg">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-black">
                                <i class="fa-solid fa-play"></i>
                            </div>
                        </div>
                    </div>
                    <h3 class="font-bold text-sm truncate text-white">${track.title}</h3>
                    <p class="text-xs text-gray-500 mt-1 uppercase tracking-tighter">${track.artist}</p>
                </div>
            `).join('');
        }

        function playTrack(index) {
            currentIndex = index;
            const track = currentPlaylist[index];
            
            document.getElementById('pTitle').innerText = track.title;
            document.getElementById('pArtist').innerText = track.artist;
            document.getElementById('pCover').src = track.cover;
            
            ytPlayer.loadVideoById(track.id);
            updatePlayIcon(true);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updateProgress();
            }
            if (event.data == YT.PlayerState.ENDED) {
                nextTrack();
            }
        }

        function updateProgress() {
            if (ytPlayer && ytPlayer.getCurrentTime) {
                const current = ytPlayer.getCurrentTime();
                const total = ytPlayer.getDuration();
                const pct = (current / total) * 100;
                
                document.querySelector('.progress-bar-inner').style.width = pct + '%';
                document.getElementById('currTime').innerText = formatTime(current);
                document.getElementById('totalTime').innerText = formatTime(total);
                
                if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    requestAnimationFrame(updateProgress);
                }
            }
        }

        // --- CONTROLES ---
        const playBtn = document.getElementById('playBtn');
        playBtn.onclick = () => {
            const state = ytPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                ytPlayer.pauseVideo();
                updatePlayIcon(false);
            } else {
                ytPlayer.playVideo();
                updatePlayIcon(true);
            }
        };

        document.getElementById('nextBtn').onclick = nextTrack;
        document.getElementById('prevBtn').onclick = () => {
            if(currentIndex > 0) playTrack(currentIndex - 1);
        };

        function nextTrack() {
            if(currentIndex < currentPlaylist.length - 1) playTrack(currentIndex + 1);
        }

        function updatePlayIcon(isPlaying) {
            const icon = document.getElementById('playIcon');
            icon.className = isPlaying ? "fa-solid fa-pause text-xl" : "fa-solid fa-play text-xl ml-1";
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Barra de búsqueda
        document.getElementById('searchInput').onkeypress = (e) => {
            if(e.key === 'Enter') {
                searchTracks(e.target.value);
                document.getElementById('viewTitle').innerHTML = `Resultados de <span class="text-green-500">"${e.target.value}"</span>`;
            }
        };

        // Volumen
        document.getElementById('volumeSlider').oninput = (e) => {
            ytPlayer.setVolume(e.target.value);
        };

        // Click en barra de progreso para saltar
        document.getElementById('progressCont').onclick = (e) => {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.pageX - rect.left) / rect.width;
            ytPlayer.seekTo(pos * ytPlayer.getDuration());
        };

    </script>
</body>
</html>

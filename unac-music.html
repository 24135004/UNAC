<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNAC Music | YouTube Style</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --yt-black: #030303;
            --yt-dark: #0f0f0f;
            --yt-light: #272727;
            --yt-red: #ff0000;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--yt-black);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Estilo Google */
        #loginOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background-color: var(--yt-black);
            display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: var(--yt-dark);
            border: 1px solid #333;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* UI YouTube Music */
        .sidebar { background: var(--yt-black); width: 240px; }
        .nav-item { 
            display: flex; align-items: center; gap: 20px; 
            padding: 12px 24px; color: #aaa; transition: 0.2s;
            cursor: pointer; font-size: 15px;
        }
        .nav-item:hover { background: var(--yt-light); color: white; }
        .nav-item.active { background: var(--yt-light); color: white; font-weight: 500; }

        .search-container {
            background: rgba(255,255,255,0.1);
            border: 1px solid transparent;
            border-radius: 8px;
            transition: 0.3s;
        }
        .search-container:focus-within {
            background: white;
            color: black;
        }
        .search-container:focus-within input { color: black; }

        .song-card {
            transition: 0.3s;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
        }
        .song-card:hover { background: var(--yt-light); }
        .song-card img { border-radius: 4px; width: 100%; aspect-ratio: 1; object-fit: cover; }

        /* Reproductor Inferior */
        .player-bar {
            background: var(--yt-dark);
            height: 72px;
            border-top: 1px solid #333;
            display: flex; align-items: center;
            padding: 0 16px;
            position: fixed; bottom: 0; width: 100%;
            z-index: 100;
        }

        .progress-container {
            position: absolute; top: -2px; left: 0; width: 100%;
            height: 4px; background: #333; cursor: pointer;
        }
        .progress-bar { height: 100%; background: var(--yt-red); width: 0%; position: relative; }

        /* Ocultar Video de YouTube */
        #yt-hidden-engine { position: absolute; top: -9999px; }

        input::placeholder { color: #888; }
    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO DE SESIÓN -->
    <div id="loginOverlay">
        <div class="login-card shadow-2xl">
            <div class="flex justify-center mb-6">
                <div class="flex items-center gap-2">
                    <i class="fa-brands fa-youtube text-4xl text-red-600"></i>
                    <span class="text-2xl font-bold tracking-tighter">Music</span>
                </div>
            </div>
            <h2 class="text-2xl mb-2">Iniciar sesión</h2>
            <p class="text-gray-400 mb-8">Usa tu cuenta de UNAC Music</p>
            
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="Correo electrónico" required 
                       class="w-full bg-transparent border border-gray-600 p-4 rounded focus:border-blue-500 outline-none">
                <input type="password" id="pass" placeholder="Contraseña" required 
                       class="w-full bg-transparent border border-gray-600 p-4 rounded focus:border-blue-500 outline-none">
                <div class="text-left text-blue-400 text-sm font-medium cursor-pointer hover:underline">¿Olvidaste tu contraseña?</div>
                <div class="flex justify-between items-center mt-10">
                    <span class="text-blue-400 font-medium cursor-pointer hover:underline">Crear cuenta</span>
                    <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded font-medium hover:bg-blue-700">Siguiente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app" class="hidden flex h-screen flex-col">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-6 bg-[#030303] z-50">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-bars text-xl cursor-pointer"></i>
                <div class="flex items-center gap-1">
                    <i class="fa-brands fa-youtube text-3xl text-red-600"></i>
                    <span class="text-xl font-bold tracking-tighter">Music</span>
                </div>
            </div>

            <div class="flex-grow max-w-2xl px-10">
                <div class="search-container flex items-center px-4 py-2">
                    <i class="fa-solid fa-search text-gray-400 mr-4"></i>
                    <input type="text" id="searchInput" placeholder="Buscar canciones, álbumes, artistas..." 
                           class="bg-transparent w-full outline-none text-white">
                </div>
            </div>

            <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-blue-500 rounded-full cursor-pointer flex items-center justify-center font-bold">
                U
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside class="sidebar py-4 hidden lg:block">
                <div class="nav-item active"><i class="fa-solid fa-house"></i> Inicio</div>
                <div class="nav-item"><i class="fa-solid fa-compass"></i> Explorar</div>
                <div class="nav-item"><i class="fa-solid fa-music"></i> Biblioteca</div>
                <hr class="border-gray-800 my-4">
                <div class="px-6 mb-2 text-gray-400 text-sm font-medium">Listas de reproducción</div>
                <div class="nav-item text-sm">+ Nueva lista</div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto px-10 py-6 pb-32 bg-[#030303]">
                <h2 id="sectionTitle" class="text-2xl font-bold mb-6">Resultados recomendados</h2>
                <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                    <!-- Dinámico -->
                </div>
            </main>
        </div>

        <!-- Reproductor -->
        <footer class="player-bar">
            <div class="progress-container" id="progCont">
                <div class="progress-bar" id="progFill"></div>
            </div>

            <div class="flex items-center gap-4 w-1/4">
                <div class="flex items-center gap-4">
                    <button onclick="prevTrack()"><i class="fa-solid fa-backward-step text-xl"></i></button>
                    <button id="playBtn" onclick="togglePlay()" class="w-10 h-10 flex items-center justify-center">
                        <i id="playIcon" class="fa-solid fa-play text-2xl"></i>
                    </button>
                    <button onclick="nextTrack()"><i class="fa-solid fa-forward-step text-xl"></i></button>
                </div>
                <div class="flex items-center gap-3 ml-4">
                    <span id="timeCurr" class="text-xs text-gray-400">0:00</span>
                    <span class="text-gray-600">/</span>
                    <span id="timeTotal" class="text-xs text-gray-400">0:00</span>
                </div>
            </div>

            <div class="flex items-center justify-center gap-4 w-2/4">
                <img id="p-img" src="https://via.placeholder.com/45" class="w-11 h-11 rounded shadow">
                <div class="text-center truncate max-w-xs">
                    <p id="p-name" class="font-bold text-sm truncate">Sin reproducción</p>
                    <p id="p-artist" class="text-xs text-gray-400 truncate">Selecciona una canción</p>
                </div>
                <div class="flex gap-4 ml-6">
                    <i class="fa-solid fa-thumbs-down cursor-pointer text-gray-400 hover:text-white"></i>
                    <i class="fa-solid fa-thumbs-up cursor-pointer text-gray-400 hover:text-white"></i>
                </div>
            </div>

            <div class="w-1/4 flex justify-end items-center gap-6">
                <i class="fa-solid fa-volume-high text-gray-400"></i>
                <input type="range" id="vol" class="w-24 accent-white" min="0" max="100" value="80">
                <i class="fa-solid fa-repeat text-gray-400"></i>
                <i class="fa-solid fa-shuffle text-gray-400"></i>
            </div>
        </footer>
    </div>

    <!-- MOTOR DE YOUTUBE OCULTO -->
    <div id="yt-hidden-engine"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let currentList = [];
        let curIdx = -1;

        // LOGIN
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            // Simular validación
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            search("Top Hits 2024");
        };

        // YOUTUBE INIT
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-hidden-engine', {
                height: '0', width: '0',
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onReady': () => console.log("YT Engine Ready")
                }
            });
        }

        // BUSCADOR (USA ITUNES PARA CARÁTULAS Y LUEGO BUSCA EN YOUTUBE EL COMPLETO)
        async function search(query) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<p class="text-gray-400">Buscando...</p>';

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=18`);
                const data = await res.json();
                
                currentList = data.results.map(s => ({
                    title: s.trackName,
                    artist: s.artistName,
                    img: s.artworkUrl100.replace('100x100', '600x600'),
                    ytQuery: `${s.trackName} ${s.artistName} official audio`
                }));

                grid.innerHTML = '';
                currentList.forEach((s, i) => {
                    grid.innerHTML += `
                        <div class="song-card" onclick="loadTrack(${i})">
                            <img src="${s.img}" class="shadow-lg mb-3">
                            <p class="font-medium text-sm truncate">${s.title}</p>
                            <p class="text-xs text-gray-400 truncate mt-1">${s.artist}</p>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-red-500">Error de conexión.</p>';
            }
        }

        async function loadTrack(i) {
            curIdx = i;
            const s = currentList[i];
            
            // Actualizar Player UI
            document.getElementById('p-name').innerText = s.title;
            document.getElementById('p-artist').innerText = s.artist;
            document.getElementById('p-img').src = s.img;
            document.getElementById('playIcon').className = "fa-solid fa-spinner animate-spin text-2xl";

            // Buscar en YouTube la versión COMPLETA
            try {
                const searchRes = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(s.ytQuery)}&filter=music_videos`);
                const searchData = await searchRes.json();
                const videoId = searchData.items[0].url.split('v=')[1];
                
                player.loadVideoById(videoId);
                updatePlayIcon(true);
            } catch (err) {
                alert("No se pudo obtener el audio completo.");
            }
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if(state === 1) { player.pauseVideo(); updatePlayIcon(false); }
            else { player.playVideo(); updatePlayIcon(true); }
        }

        function updatePlayIcon(playing) {
            document.getElementById('playIcon').className = playing ? "fa-solid fa-pause text-2xl" : "fa-solid fa-play text-2xl";
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                setInterval(updateProgress, 1000);
            }
            if (event.data == YT.PlayerState.ENDED) nextTrack();
        }

        function updateProgress() {
            if(player && player.getDuration) {
                const cur = player.getCurrentTime();
                const dur = player.getDuration();
                const pct = (cur / dur) * 100;
                document.getElementById('progFill').style.width = pct + '%';
                document.getElementById('timeCurr').innerText = formatTime(cur);
                document.getElementById('timeTotal').innerText = formatTime(dur);
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function nextTrack() { if(curIdx < currentList.length - 1) loadTrack(curIdx + 1); }
        function prevTrack() { if(curIdx > 0) loadTrack(curIdx - 1); }

        document.getElementById('searchInput').onkeypress = (e) => {
            if(e.key === 'Enter') {
                search(e.target.value);
                document.getElementById('sectionTitle').innerText = 'Resultados de "' + e.target.value + '"';
            }
        };

        document.getElementById('progCont').onclick = (e) => {
            const pct = e.offsetX / e.target.clientWidth;
            player.seekTo(pct * player.getDuration());
        };

        document.getElementById('vol').oninput = (e) => player.setVolume(e.target.value);

    </script>
</body>
</html>

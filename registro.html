<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Registro y Padrón Oficial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: #ffffff; overflow-x: hidden;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .main-wrapper {
            position: relative; z-index: 10;
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.4) 0%, rgba(5, 5, 5, 1) 100%), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; width: 100%;
        }

        header { width: 100%; max-width: 1200px; padding: 30px 20px; z-index: 1000; margin: 0 auto; }
        .nav-link { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; position: relative; transition: 0.3s; }
        .nav-link:hover, .active-link { color: var(--accent); }

        #mobile-menu { position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 35px; }
        #mobile-menu.active { display: flex; }

        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); border-radius: 20px; }
        
        .form-container { width: 100%; height: 700px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 193, 7, 0.2); background: rgba(255,255,255,0.02); }

        input[type="text"] {
            width: 100%; max-width: 400px; padding: 18px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--accent);
            color: #fff; border-radius: 12px; font-size: 1.2rem;
            text-align: center; outline: none; transition: 0.3s;
        }

        .btn-search {
            background: var(--accent); color: #000; padding: 15px 40px;
            border-radius: 10px; font-weight: 900; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-search:hover { background: #fff; transform: scale(1.05); }

        .data-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; text-align: left; }
        .data-item label { color: var(--accent); font-size: 10px; text-transform: uppercase; font-weight: 800; display: block; letter-spacing: 1px; }
        .data-item p { font-size: 1.2rem; margin-top: 4px; font-weight: 600; }

        #globe-container { width: 100%; height: 350px; pointer-events: none; margin-top: -30px; }
    </style>
</head>
<body>

    <div id="mobile-menu">
        <button onclick="toggleMenu()" class="absolute top-10 right-10 text-yellow-500 text-4xl"><i class="fa-solid fa-xmark"></i></button>
        <a href="index.html" class="text-xl font-black text-white">Inicio</a>
        <a href="registro.html" class="text-xl font-black text-yellow-500 underline">Registro</a>
    </div>

    <div class="main-wrapper">
        <header class="flex justify-between items-center relative z-20 animate-fade-up">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center shadow-lg"><i class="fa-solid fa-bus text-black text-lg"></i></div>
                <div class="flex flex-col text-left leading-none uppercase">
                    <span class="text-[10px] font-black tracking-widest">UNAC</span>
                    <span class="text-[9px] text-yellow-500 font-bold">Movilidad</span>
                </div>
            </div>
            <nav class="hidden md:flex gap-8 nav-desktop">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="registro.html" class="nav-link active-link">Registro</a>
            </nav>
            <button onclick="toggleMenu()" class="md:hidden text-yellow-500 text-xl"><i class="fa-solid fa-bars"></i></button>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-8 flex flex-col items-center">
            
            <!-- REGISTRO -->
            <div class="w-full text-center mb-20 animate-fade-up">
                <h2 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter mb-8">Formulario de <span class="text-yellow-500">Registro</span></h2>
                <div class="form-container glass">
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc5WSGfVJaDvTaZ4HNSEEim4G-1m3nzOYZlT_UgvzOBfObKew/viewform?embedded=true" width="100%" height="100%" frameborder="0">Cargando...</iframe>
                </div>
            </div>

            <!-- CONSULTA -->
            <div class="w-full text-center mb-10 animate-fade-up">
                <div class="w-full h-px bg-white/5 mb-16"></div>
                <h2 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter mb-10">Consulta de <span class="text-yellow-500">Padrón</span></h2>
                
                <div class="glass p-10 w-full max-w-xl mx-auto mb-8 border-t-2 border-yellow-500">
                    <input type="text" id="dniInput" placeholder="INGRESA TU DNI" maxlength="8">
                    <div class="mt-6">
                        <button class="btn-search" id="searchBtn">Verificar Registro</button>
                    </div>
                </div>

                <!-- RESULTADOS CON LOS IDS CORREGIDOS -->
                <div id="resultsBox" class="glass p-8 w-full max-w-xl mx-auto hidden animate-fade-up border-l-4 border-yellow-500">
                    <div class="data-item"><label>Estudiante:</label><p id="resNombre">-</p></div>
                    <div class="data-item"><label>Código UNAC:</label><p id="resCodigo">-</p></div>
                    <div class="data-item"><label>Facultad:</label><p id="resFacultad">-</p></div>
                    <div class="data-item"><label>Horario Asignado:</label><p id="resHorario">-</p></div>
                    <div class="data-item"><label>WhatsApp Registrado:</label><p id="resWhatsApp" class="text-yellow-500">-</p></div>
                    
                    <div class="mt-6 p-4 bg-green-500/10 border border-green-500/30 text-green-400 rounded-xl font-black text-center text-sm tracking-widest">
                        REGISTRO VALIDADO ✅
                    </div>
                </div>

                <div id="errorBox" class="glass p-8 w-full max-w-xl mx-auto hidden border-red-500/30">
                    <h3 class="text-red-500 font-black uppercase">DNI no encontrado</h3>
                </div>
            </div>

            <div id="globe-container" class="animate-float"></div>
        </main>
    </div>

    <script>
        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('active'); }

        // TU LINK DE SCRIPT ACTUALIZADO
        const API_URL = 'https://script.google.com/macros/s/AKfycbz6US3Io8FglgIqVyA70KpjLSTSIydz1zh5TPNgR2ihOko1zlE560PluIsgAwhqOjYiAA/exec';

        document.getElementById('searchBtn').addEventListener('click', function() {
            const dni = document.getElementById('dniInput').value.trim();
            if(dni.length < 8) return alert("Ingresa un DNI de 8 dígitos.");

            this.innerText = "PROCESANDO...";
            document.getElementById('resultsBox').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');

            fetch(`${API_URL}?dni=${dni}&t=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    this.innerText = "VERIFICAR REGISTRO";
                    if(data.found) {
                        // Lógica de privacidad: Primer nombre y 2 iniciales del resto
                        const nombreLimpio = data.Nombres.split(' ')[0]; 
                        const apellidoMask = data.Apellidos.substring(0,2) + "**********";
                        const codigoMask = data.Codigo.toString().substring(0,2) + "********";
                        const whatsappMask = data.WhatsApp.toString().substring(0,2) + "********";

                        document.getElementById('resNombre').innerText = nombreLimpio + " " + apellidoMask;
                        document.getElementById('resCodigo').innerText = codigoMask;
                        document.getElementById('resFacultad').innerText = data.Facultad;
                        document.getElementById('resHorario').innerText = data.Horario;
                        document.getElementById('resWhatsApp').innerText = whatsappMask;
                        
                        document.getElementById('resultsBox').classList.remove('hidden');
                    } else {
                        document.getElementById('errorBox').classList.remove('hidden');
                    }
                })
                .catch(() => {
                    this.innerText = "VERIFICAR REGISTRO";
                    alert("Error al conectar con la base de datos.");
                });
        });

        // GLOBO 3D
        let scene, camera, renderer, globe;
        function initThree() {
            const container = document.getElementById('globe-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / 350, 0.1, 1000);
            camera.position.z = 100;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, 350);
            container.appendChild(renderer.domElement);
            globe = new THREE.Mesh(new THREE.IcosahedronGeometry(30, 2), new THREE.MeshBasicMaterial({ color: 0xffc107, wireframe: true, transparent: true, opacity: 0.1 }));
            scene.add(globe);
            animate();
        }
        function animate() { requestAnimationFrame(animate); if(globe) globe.rotation.y += 0.002; renderer.render(scene, camera); }
        window.onload = initThree;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | PRUEBA DE TICKETS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --accent: #ffc107; --dark: #050505; }
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: var(--dark); font-family: 'Inter', sans-serif; color: #ffffff; overflow-x: hidden; }
        .main-wrapper { position: relative; z-index: 10; background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.4) 0%, rgba(5, 5, 5, 1) 100%), url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; width: 100%; }
        header { width: 100%; max-width: 1200px; padding: 30px 20px; z-index: 1000; margin: 0 auto; }
        .nav-link { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; position: relative; transition: 0.3s; }
        .nav-link:hover, .active-link { color: var(--accent); }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -6px; left: 0; background: var(--accent); transition: width 0.3s; }
        #mobile-menu { position: fixed; inset: 0; background: rgba(5,5,5,0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 35px; }
        #mobile-menu.active { display: flex; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); border-radius: 20px; }
        input[type="text"] { width: 100%; max-width: 400px; padding: 18px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--accent); color: #fff; border-radius: 12px; font-size: 1.2rem; text-align: center; outline: none; }
        .btn-search { background: var(--accent); color: #000; padding: 15px 40px; border-radius: 10px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .card-turno { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; transition: 0.4s; }
        .card-turno.active { border-color: var(--accent); background: rgba(255, 193, 7, 0.05); }
        .card-turno.locked { opacity: 0.3; filter: grayscale(1); }
        .timer-badge { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 900; background: var(--accent); color: black; padding: 4px 10px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="flex justify-between items-center relative z-20">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-yellow-500 rounded flex items-center justify-center shadow-lg"><i class="fa-solid fa-bus text-black text-lg"></i></div>
                <div class="flex flex-col text-left leading-none uppercase">
                    <span class="text-[10px] font-black tracking-widest leading-none">UNAC</span>
                    <span class="text-[9px] text-yellow-500 font-bold">Movilidad</span>
                </div>
            </div>
            <nav class="hidden md:flex gap-8 nav-minimal">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="ticket.html" class="nav-link active-link">Ticket</a>
                <a href="registro.html" class="nav-link">Registro</a>
                <a href="contacto.html" class="nav-link">Contacto</a>
            </nav>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-12 flex flex-col items-center">
            
            <div class="text-center mb-10">
                <span class="text-yellow-500 text-[10px] font-black uppercase tracking-[5px] mb-2 block italic">MODO PRUEBA ACTIVADO</span>
                <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter mb-4">Tickets <span class="text-yellow-500">De Prueba</span></h1>
                <p id="live-clock" class="text-white font-mono text-lg font-bold opacity-70"></p>
            </div>

            <!-- PASO 1: BUSCADOR -->
            <div id="step-verify" class="glass p-10 w-full max-w-xl mx-auto text-center mb-8 border-t-2 border-yellow-500">
                <input type="text" id="dniInput" placeholder="N° DE DNI" maxlength="8">
                <div class="mt-6"><button class="btn-search" id="verifyBtn">Verificar Alumno</button></div>
            </div>

            <!-- PASO 2: SELECCIÓN -->
            <div id="step-selection" class="w-full max-w-4xl mx-auto hidden">
                <h2 id="welcomeName" class="text-2xl font-black uppercase italic text-center text-white mb-8"></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="card-mañana" class="card-turno">
                        <span class="timer-badge">MODO TEST</span>
                        <h3 class="text-3xl font-black italic">05:15 AM</h3>
                        <div id="mañana-status" class="mt-6"></div>
                    </div>
                    <div id="card-tarde" class="card-turno locked">
                        <span class="timer-badge">BLOQUEADO</span>
                        <h3 class="text-3xl font-black italic">06:00 PM</h3>
                        <div id="tarde-status" class="mt-6"><p class="text-[9px] uppercase">No disponible en test</p></div>
                    </div>
                </div>
            </div>

            <!-- PASO 3: TICKET QR -->
            <div id="step-ticket" class="glass p-8 w-full max-w-sm mx-auto text-center border-b-4 border-yellow-500 hidden relative">
                <div id="qrcode" class="flex justify-center mb-6 p-2 bg-white rounded-lg shadow-2xl"></div>
                <div class="text-left border-t border-white/10 pt-4">
                    <p id="ticketName" class="font-black uppercase italic text-lg text-white"></p>
                    <p id="ticketInfo" class="text-yellow-500 font-bold text-xs uppercase"></p>
                </div>
                <button onclick="location.reload()" class="mt-6 text-[10px] text-gray-500 font-black uppercase underline">Probar otro DNI</button>
            </div>

        </main>

        <footer class="w-full py-12 flex flex-col items-center border-t border-white/5 bg-black/20 mt-10">
            <span class="text-center text-[10px] font-bold tracking-[8px] text-yellow-500 mb-2 uppercase">SISTEMA CREADO POR SEBASTIAN</span>
        </footer>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz6US3Io8FglgIqVyA70KpjLSTSIydz1zh5TPNgR2ihOko1zlE560PluIsgAwhqOjYiAA/exec';
        let currentDni = "";
        let currentName = "";

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
            if (currentDni) updateShiftLogics(); // Lógica de test
        }
        setInterval(updateClock, 1000);

        // --- MODO PRUEBA: ESTA FUNCIÓN IGNORA LA HORA REAL ---
        function updateShiftLogics() {
            const mañanaStatus = document.getElementById('mañana-status');
            const cardMañana = document.getElementById('card-mañana');

            // FORZADO: Siempre activo para probar el QR
            cardMañana.className = "card-turno active";
            mañanaStatus.innerHTML = `
                <button onclick="generarTicket('05:15 AM')" class="w-full bg-yellow-500 text-black font-black py-3 rounded-lg uppercase text-xs">
                    GENERAR QR AHORA (TEST)
                </button>`;
        }

        function generarTicket(turno) {
            document.getElementById('step-selection').classList.add('hidden');
            document.getElementById('step-ticket').classList.remove('hidden');
            
            const dateStr = new Date().toLocaleDateString();
            document.getElementById('ticketName').innerText = currentName;
            document.getElementById('ticketInfo').innerText = `PRUEBA: ${turno} | FECHA: ${dateStr}`;

            // FORMATO PRIVADO PARA DELEGADOS: UNAC-OFFICIAL|DNI|TURNO|FECHA
            const secret = btoa(`UNAC-OFFICIAL|${currentDni}|${turno}|${dateStr}`);

            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: secret, width: 200, height: 200, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
            });
        }

        document.getElementById('verifyBtn').addEventListener('click', function() {
            const dni = document.getElementById('dniInput').value.trim();
            if(dni.length < 8) return alert("DNI inválido.");
            this.innerText = "BUSCANDO...";
            fetch(`${API_URL}?dni=${dni}&t=${new Date().getTime()}`)
                .then(res => res.json()).then(data => {
                    this.innerText = "Verificar Alumno";
                    if(data.found) {
                        currentDni = dni; currentName = (data.Nombres || data.Estudiante || "Estudiante");
                        document.getElementById('step-verify').classList.add('hidden');
                        document.getElementById('step-selection').classList.remove('hidden');
                        document.getElementById('welcomeName').innerText = "LISTO: " + currentName;
                        updateClock();
                    } else {
                        alert("DNI no encontrado en la base de datos.");
                    }
                });
        });
    </script>
</body>
</html>

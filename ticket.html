<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNAC | Mantenimiento</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root { --accent: #ffc107; --dark: #050505; }
        
        html, body { 
            width: 100%; 
            height: 100vh;
            margin: 0; 
            padding: 0; 
            background-color: var(--dark); 
            font-family: 'Inter', sans-serif; 
            color: #ffffff; 
            overflow-x: hidden;
        }

        .main-wrapper { 
            position: relative;
            z-index: 10;
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.5) 0%, rgba(5, 5, 5, 1) 100%), url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER RESPONSIVE */
        header {
            width: 100%;
            padding: 1rem 1.25rem;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 193, 7, 0.2);
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(10px);
        }

        @media (min-width: 768px) {
            header {
                padding: 1.5rem 2.5rem;
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 2.25rem;
            height: 2.25rem;
            background: var(--accent);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            text-align: left;
            line-height: 1;
        }

        .logo-text-main {
            font-size: 0.625rem;
            font-weight: 900;
            letter-spacing: 0.125rem;
            text-transform: uppercase;
        }

        .logo-text-sub {
            font-size: 0.5625rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-desktop {
            display: none;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .nav-desktop {
                display: flex;
                gap: 2.5rem;
            }
        }

        .nav-link {
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.125rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            position: relative;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link:hover, .active-link {
            color: var(--accent);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -6px;
            left: 0;
            background: var(--accent);
            transition: width 0.3s;
        }

        .nav-link:hover::after, .active-link::after {
            width: 100%;
        }

        .btn-menu {
            display: flex;
            color: var(--accent);
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .btn-menu {
                display: none;
            }
        }

        /* CONTENIDO PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.5rem 1rem;
        }

        @media (min-width: 768px) {
            main {
                padding: 2rem;
            }
        }

        #canvas-container {
            width: 90vw;
            max-width: 700px;
            height: 70vh;
            max-height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(255, 193, 7, 0.2);
            border: 2px solid rgba(255, 193, 7, 0.3);
        }

        @media (min-width: 768px) {
            #canvas-container {
                width: 80vw;
                max-width: 800px;
                height: 65vh;
                max-height: 600px;
                border-radius: 25px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- HEADER FIJO -->
        <header class="animate-fade-up">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fa-solid fa-bus text-black text-lg"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-text-main">UNAC</span>
                    <span class="logo-text-sub">Movilidad</span>
                </div>
            </div>

            <nav class="nav-desktop">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="rutas.html" class="nav-link">Rutas</a>
                <a href="ticket.html" class="nav-link active-link">Ticket</a>
                <a href="registro.html" class="nav-link">Registro</a>
                <a href="noticias.html" class="nav-link">Noticias</a>
                <a href="contacto.html" class="nav-link">Contacto</a>
            </nav>

            <button class="btn-menu" onclick="toggleMenu()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </header>

        <!-- CANVAS 3D CENTRADO -->
        <main class="animate-fade-up">
            <div id="canvas-container"></div>
        </main>
    </div>

    <script>
        // CANVAS 3D
        let scene, camera, renderer;

        function initCanvas() {
            const container = document.getElementById('canvas-container');
            if (!container) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0x000000, 0.1);
            renderer.pixelRatio = Math.min(window.devicePixelRatio, 2);
            container.appendChild(renderer.domElement);

            // Partículas
            const particleCount = 1500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 6;
                positions[i3 + 1] = (Math.random() - 0.5) * 6;
                positions[i3 + 2] = (Math.random() - 0.5) * 6;

                const yellow = new THREE.Color(0xffc107);
                colors[i3] = yellow.r;
                colors[i3 + 1] = yellow.g;
                colors[i3 + 2] = yellow.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.02, vertexColors: true, sizeAttenuation: true });
            const points = new THREE.Points(geometry, material);
            scene.add(points);

            animate();

            function animate() {
                requestAnimationFrame(animate);
                points.rotation.x += 0.0005;
                points.rotation.y += 0.001;
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            if (!container || !camera || !renderer) return;
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function toggleMenu() {
            console.log('Menú mobile');
        }

        window.addEventListener('load', () => {
            initCanvas();
        });
    </script>
</body>
</html>
